/* ─── helpers ─────────────────────────────────────────────────────────────── */
async function cachedLogo() {
  try {
    if ('caches' in window) {
      const cache = await caches.open('wayle-assets-v1');
      const hit = await cache.match(LOGO_URL);
      if (hit) return URL.createObjectURL(await hit.blob());
      const res = await fetch(LOGO_URL);
      if (res.ok) { cache.put(LOGO_URL, res.clone()); return URL.createObjectURL(await res.blob()); }
    }
  } catch(e) {}
  return LOGO_URL;
}

async function detectCaps() {
  const ua = navigator.userAgent;
  const isMobile = /Mobi|Android|iPhone|iPad/.test(ua);
  let hasWebGPU = false, gpuInfo = null;
  try {
    if (navigator.gpu) {
      const a = await navigator.gpu.requestAdapter({ powerPreference:'high-performance' });
      if (a) {
        hasWebGPU = true;
        const info = await a.requestAdapterInfo().catch(() => ({}));
        gpuInfo = info?.description || info?.vendor || 'GPU active';
      }
    }
  } catch(e) {}
  return { isMobile, hasWebGPU, gpuInfo, hasSAB: typeof SharedArrayBuffer !== 'undefined', ram: navigator.deviceMemory || 4 };
}

class InferenceWorker {
  constructor() { this.w = null; this.pending = new Map(); this.streams = new Map(); this.n = 0; }
  init() {
    this.w = new Worker('inference_worker.js');
    this.w.onmessage = ({ data }) => {
      const { type, id } = data;
      const req = this.pending.get(id);
      const st  = this.streams.get(id);
      switch (type) {
        case 'load_progress':  req?.onProgress?.(data); break;
        case 'load_done':      req?.resolve(data); this.pending.delete(id); break;
        case 'load_error':     req?.reject(new Error(data.error)); this.pending.delete(id); break;
        case 'token':          st?.onToken(data.token, data.stats); break;
        case 'done':           st?.onDone(data.stats); this.streams.delete(id); this.pending.delete(id); break;
        case 'generate_error': st?.onError(new Error(data.error)); this.streams.delete(id); this.pending.delete(id); break;
        case 'aborted':        st?.onDone({ aborted:true }); this.streams.delete(id); this.pending.delete(id); break;
        default:               req?.resolve(data); this.pending.delete(id);
      }
    };
    this.w.onerror = e => console.error('[Worker]', e);
  }
  loadModel(mid, onProgress) {
    return new Promise((resolve, reject) => {
      const id = ++this.n;
      this.pending.set(id, { resolve, reject, onProgress });
      this.w.postMessage({ type:'load_model', id, modelId:mid });
    });
  }
  generate(prompt, opts, { onToken, onDone, onError }) {
    const id = ++this.n;
    this.streams.set(id, { onToken, onDone, onError });
    this.pending.set(id, {});
    this.w.postMessage({ type:'generate', id, prompt, options:opts });
    return id;
  }
  abort(id)  { this.w.postMessage({ type:'abort', id }); }
  resetKV()  { return new Promise((resolve, reject) => { const id = ++this.n; this.pending.set(id, { resolve, reject }); this.w.postMessage({ type:'reset_kv', id }); }); }
  terminate(){ this.w?.terminate(); }
}

/* ─── markdown ────────────────────────────────────────────────────────────── */
function md(text) {
  if (!text) return '';
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```([\w]*)\n?([\s\S]*?)```/g, (_, l, c) => `<pre class="cb"><span class="cl">${l||'code'}</span><code>${c.trim()}</code></pre>`)
    .replace(/`([^`]+)`/g, '<code class="ic">$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>').replace(/^## (.+)$/gm, '<h2>$1</h2>').replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/^[-*] (.+)$/gm, '<li>$1</li>').replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`)
    .replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br/>')
    .replace(/^(?!<[hupol])(.+)/, '<p>$1').replace(/([^>])$/, '$1</p>');
}

/* ─── streaming word-blur text ───────────────────────────────────────────── */
function StreamingText({ content }) {
  const parts = content.split(/(\s+)/);
  return (
    <span>
      {parts.map((p, i) => {
        if (/^\s+$/.test(p)) return p;
        return <span key={i} className="wtok" style={{ animationDelay:`${i * 0.03}s` }}>{p}</span>;
      })}
      <span className="cur"/>
    </span>
  );
}

  );
}

/* ─── App ─────────────────────────────────────────────────────────────────── */
function App() {
  const [view,        setView]        = useState('chat');
  const [msgs,        setMsgs]        = useState([]);
  const [input,       setInput]       = useState('');
  const [curMod,      setCurMod]      = useState(MODELS[1]);
  const [loadedModel, setLoadedModel] = useState(null);
  const [engState,    setEngState]    = useState('idle');
  const [loadProg,    setLoadProg]    = useState({ text:'', percent:0 });
  const [streaming,   setStreaming]   = useState(false);
  const [streamStats, setStreamStats] = useState(null);
  const [logo,        setLogo]        = useState(LOGO_URL);
  const [toast,       setToast]       = useState(null);
  const [caps,        setCaps]        = useState(null);
  const [gated,       setGated]       = useState(false);
  const [attachedImg, setAttachedImg] = useState(null);

  const wRef     = useRef(null);
  const genIdRef = useRef(null);
  const taRef    = useRef(null);
  const botRef   = useRef(null);
  const fileRef  = useRef(null);

  /* ── init ── */
  useEffect(() => {
    const splash = document.getElementById('splash');
    if (splash) {
      splash.style.animation = 'sOut .4s ease forwards';
      setTimeout(() => splash.remove(), 420);
    }

    cachedLogo().then(setLogo);
    detectCaps().then(c => { setCaps(c); /* removed WebGPU gate so UI always shows */ });

    try {
      const w = new InferenceWorker();
      w.init();
      wRef.current = w;
    } catch(e) {
      console.warn('[Worker]', e);
    }

    return () => wRef.current?.terminate();
  }, []);

  const toast$ = useCallback((msg, ms=2800) => {
    setToast(msg);
    setTimeout(() => setToast(null), ms);
  }, []);

  useEffect(() => {
    requestAnimationFrame(() => botRef.current?.scrollIntoView({ behavior:'smooth', block:'end' }));
  }, [msgs.length, streaming]);

  const resize = useCallback(() => {
    const el = taRef.current;
    if (!el) return;
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }, []);

  const loadModel = useCallback(async (m) => {
    if (!wRef.current) { toast$('Worker not ready'); return; }
    setCurMod(m);
    setEngState('loading');
    setLoadProg({ text:'Initializing…', percent:0 });
    try {
      await wRef.current.loadModel(m.id, p => setLoadProg({ text:p.text, percent:p.percent }));
      setLoadedModel(m.id);
      setEngState('ready');
      toast$(`${m.label} loaded ✓`);
    } catch(e) {
      setEngState('error');
      if (e.message === 'NO_WEBGPU') setGated(true);
      else toast$(`Load failed: ${e.message}`);
    }
  }, [toast$]);

  /* ── image attach ── */
  const handleImageFile = useCallback((file) => {
    if (!file || !file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = e => setAttachedImg({ dataUrl: e.target.result });
    reader.readAsDataURL(file);
  }, []);

  /* ── send ── */
  const handleSend = useCallback(async () => {
    const text = input.trim();
    if ((!text && !attachedImg) || streaming) return;

    const uid = () => crypto.randomUUID?.() || Math.random().toString(36).slice(2);
    const prompt = text || 'I sent you an image.';

    const uMsg = { role:'user', content: text || '📷', image: attachedImg?.dataUrl, ts:Date.now(), id:uid() };
    setMsgs(p => [...p, uMsg]);
    setInput('');
    setAttachedImg(null);
    if (taRef.current) taRef.current.style.height = 'auto';

    const aMsg = { role:'assistant', content:'', ts:Date.now(), id:uid() };
    setMsgs(p => [...p, aMsg]);
    setStreaming(true);
    setStreamStats(null);

    // Use real worker if available, otherwise demo mode
    if (wRef.current && engState === 'ready') {
      const gid = wRef.current.generate(prompt, { maxTokens:512, temperature:0.7, topP:0.9, topK:40 }, {
        onToken: (tok, stats) => {
          setStreamStats(stats);
          setMsgs(p => {
            const c = [...p];
            const l = c[c.length - 1];
            if (l.role === 'assistant') c[c.length - 1] = { ...l, content: l.content + tok };
            return c;
          });
        },
        onDone: (stats) => {
          setStreaming(false);
          genIdRef.current = null;
          setMsgs(p => {
            const c = [...p];
            const l = c[c.length - 1];
            if (l.role === 'assistant') c[c.length - 1] = { ...l, tps: stats?.totalMs ? (stats.totalTokens / stats.totalMs * 1000) : null };
            return c;
          });
        },
        onError: (e) => {
          setStreaming(false);
          genIdRef.current = null;
          toast$(`Error: ${e.message}`);
          setMsgs(p => {
            const c = [...p];
            const l = c[c.length - 1];
            if (l.role === 'assistant' && !l.content) c[c.length - 1] = { ...l, content:'⚠️ Generation failed.' };
            return c;
          });
        },
      });
      genIdRef.current = gid;
    } else {
      // Demo mode: simulate streaming response
      const demoReplies = [
        `I'm **Wayle**, a fully on-device AI assistant! 🚀\n\nTo use real AI inference, you'll need:\n- A WebGPU-enabled browser (Chrome 113+)\n- The \`inference_worker.js\` file alongside this page\n\nFor now, I'm running in **demo mode** so you can preview the UI.`,
        `That's a great question! In demo mode I can't actually run inference, but the UI is fully functional.\n\nLoad this app with its \`inference_worker.js\` companion file in Chrome to enable real on-device AI.`,
        `Wayle runs **100% on your device** — no data ever leaves your browser.\n\nSupported models include:\n- Qwen 2.5 (0.5B, 1.5B, 3B)\n- Phi-3.5 Mini\n- Mistral 7B`,
        `Sure! Here's a quick example:\n\`\`\`js\nconst result = await model.generate(prompt, { maxTokens: 512 });\nconsole.log(result);\n\`\`\`\nThis is how Wayle handles inference requests internally.`,
      ];
      const reply = demoReplies[Math.floor(Math.random() * demoReplies.length)];
      let i = 0;
      const interval = setInterval(() => {
        const chunk = reply.slice(i, i + 3);
        if (i >= reply.length) {
          clearInterval(interval);
          setStreaming(false);
          setMsgs(p => {
            const c = [...p];
            const l = c[c.length - 1];
            if (l.role === 'assistant') c[c.length - 1] = { ...l, tps: 42.0 };
            return c;
          });
          return;
        }
        setMsgs(p => {
          const c = [...p];
          const l = c[c.length - 1];
          if (l.role === 'assistant') c[c.length - 1] = { ...l, content: l.content + chunk };
          return c;
        });
        i += 3;
      }, 18);
    }
  }, [input, attachedImg, streaming, engState, curMod, loadModel, toast$]);

  const handleStop = () => { if (genIdRef.current) wRef.current?.abort(genIdRef.current); setStreaming(false); };
  const handleKey  = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } };
  const canSend    = (input.trim().length > 0 || attachedImg !== null) && !streaming;
  const onNewChat  = () => { setMsgs([]); setAttachedImg(null); wRef.current?.resetKV(); setView('chat'); };

  const SUGG = ['Explain transformer models simply', 'Write a haiku about code', "What's 17 × 23?", 'Help me debug my app'];
  const TABS = [['chat','chat_bubble','Chat'],['models','memory','Models'],['plans','diamond','Plans']];

  if (gated && false) return <Gate logo={logo}/>;

  const ChatView = (
    <div className="chat">
      {/* File picker — no capture attr so user gets gallery + camera choice */}
      <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}}
        onChange={e => { const f = e.target.files?.[0]; if (f) handleImageFile(f); e.target.value = ''; }}/>

      <div className="mbar">
        <button className="mpill" onClick={() => setView('models')}>
          <span className={`dot ${loadedModel ? 'on' : 'off'}`}/>
          {loadedModel ? curMod.label : 'No model loaded'}
          <span className="i s14" style={{marginLeft:2,color:'var(--t3)'}}>expand_more</span>
        </button>
        {streamStats && streaming && <span className="tbadge">{streamStats.tokensPerSec?.toFixed(1)} t/s</span>}
        {engState === 'loading' && (
          <div className="pw">
            <div className="mspin"/>
            <span className="pt">{loadProg.text}</span>
            <div className="ptrk"><div className="pfil" style={{width:`${loadProg.percent}%`}}/></div>
          </div>
        )}
      </div>

      <div className="msgs">
        <div className="msgs-in">
          {msgs.length === 0 ? (
            <div className="welcome">
              <div className="wlogo"><img src={logo} alt="Wayle"/></div>
              <div className="wtitle">How can I help?</div>
              {caps?.hasWebGPU && <div className="wgpu"><span className="i f s13">bolt</span>WebGPU · {caps.gpuInfo || 'GPU Ready'}</div>}
              <div className="wsub">{loadedModel ? `${curMod.label} · fully offline` : 'Try the UI in demo mode — or load a model in Chrome to run real AI'}</div>
              <div className="chips">
                {SUGG.map(s => <button key={s} className="chip" onClick={() => { setInput(s); taRef.current?.focus(); }}>{s}</button>)}
              </div>
            </div>
          ) : (
            <>
              {msgs.map((m, i) => (
                <Msg key={m.id||i} msg={m} logo={logo} streaming={streaming && i === msgs.length-1 && m.role === 'assistant'}/>
              ))}
              {streaming && msgs[msgs.length-1]?.role !== 'assistant' && <Typing logo={logo}/>}
            </>
          )}
          <div className="spacer"/><div ref={botRef} className="anch"/>
        </div>
      </div>

      <div className="ibar">
        <div className="iwrap">
          {attachedImg && (
            <div className="img-attach">
              <div className="img-preview">
                <img src={attachedImg.dataUrl} alt="attached"/>
                <button className="img-remove" onClick={() => setAttachedImg(null)}>✕</button>
              </div>
              <div className="img-pill"><span className="i f s13">image</span> Image ready</div>
            </div>
          )}
          <div className="ibox">
            <button className="img-btn" title="Attach image" onClick={() => fileRef.current?.click()}>
              <span className="i s18">add_photo_alternate</span>
            </button>
            <textarea ref={taRef} value={input}
              onChange={e => { setInput(e.target.value); resize(); }}
              onKeyDown={handleKey}
              placeholder={loadedModel ? 'Message Wayle…' : 'Load a model to start…'}
              rows={1} disabled={streaming} autoComplete="off" autoCorrect="on" spellCheck/>
            {streaming
              ? <button className="snd stop" onClick={handleStop}><span className="i f s18">stop</span></button>
              : <button className="snd" onClick={handleSend} disabled={!canSend}>
                  {engState === 'loading' ? <div className="bspin"/> : <span className="i f s18">arrow_upward</span>}
                </button>
            }
          </div>
          <div className="ihint">Wayle runs 100% on your device · no data sent anywhere</div>
        </div>
      </div>
    </div>
  );

  return (
    <div className="app">
      <aside className="sidebar">
        <button className="sb-brand" onClick={() => setView('chat')}>
          <div className="sb-logo"><img src={logo} alt="Wayle"/></div>
          <span className="sb-name">Wayle</span>
        </button>
        <nav className="sb-nav">
          {TABS.map(([id, ic, lb]) => (
            <button key={id} className={`stab${view===id?' on':''}`} onClick={() => setView(id)}>
              <span className={`i${view===id?' f':''}`}>{ic}</span>{lb}
            </button>
          ))}
        </nav>
        <div className="sb-bot">
          <button className="nc" onClick={onNewChat}>
            <span className="i s18">add_comment</span>New chat
          </button>
        </div>
      </aside>

      <div className="main">
        <div className="mtop">
          <div className="mb">
            <div className="mb-logo"><img src={logo} alt="Wayle"/></div>
            <span className="mb-name">Wayle</span>
          </div>
          <button className="ib" onClick={onNewChat}><span className="i s18">add_comment</span></button>
        </div>

        <div className="cnt">
          {view === 'chat'   && ChatView}
          {view === 'models' && <ModelsView caps={caps} curMod={curMod} loadedModel={loadedModel} engState={engState} loadProg={loadProg} onLoad={m => { loadModel(m); setView('chat'); }}/>}
          {view === 'plans'  && <PlansView/>}
        </div>

        <nav className="mbn" style={{display:'flex'}}>
          {TABS.map(([id, ic, lb]) => (
            <button key={id} className={`btab${view===id?' on':''}`} onClick={() => setView(id)}>
              <span className={`i${view===id?' f':''} s22`}>{ic}</span>{lb}
            </button>
          ))}
        </nav>
      </div>

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(() => {}); });
}
</script>
</body>
</html>
