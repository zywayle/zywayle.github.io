<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="theme-color" content="#ffffff"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Wayle"/>
  <meta name="description" content="Wayle — fast, private, on-device AI powered by ONNX Runtime Web + WebGPU"/>
  <title>Wayle</title>

  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" href="https://i.ibb.co/xSFJxP7F/wayle-dark.png"/>
  <link rel="apple-touch-icon" href="https://i.ibb.co/xSFJxP7F/wayle-dark.png"/>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>

  <style>
    html,body{margin:0;padding:0;height:100%;background:#f7f7fa;font-family:'DM Sans',sans-serif}
    #root{height:100%}
    /* Splash while loading JS */
    .splash{
      position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
      flex-direction:column;gap:14px;background:#f7f7fa;z-index:999;
      transition:opacity .3s;
    }
    .splash img{width:52px;height:52px;object-fit:contain}
    .splash-name{font-family:'Instrument Serif',serif;font-style:italic;font-size:22px;color:#0f0f18;letter-spacing:-.3px}
    .splash-spin{width:20px;height:20px;border-radius:50%;border:2.5px solid #e0d9fb;border-top-color:#7c3aed;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <!-- Splash shown before React mounts -->
  <div class="splash" id="splash">
    <img src="https://i.ibb.co/xSFJxP7F/wayle-dark.png" alt="Wayle"/>
    <div class="splash-name">Wayle</div>
    <div class="splash-spin"></div>
  </div>

  <div id="root"></div>

  <!--
    ARCHITECTURE:
    UI (main thread, React + Babel)
      ↓
    Web Worker (inference.worker.js)
      ↓
    ONNX Runtime Web (WebGPU backend)
      ↓
    Quantized ONNX model (INT4)

    The worker handles all inference so the main thread stays responsive.
    KV cache is preallocated in the worker; sliding window prevents OOM.
    Chunked execution yields to event loop every N transformer blocks.
  -->

  <!-- React + Babel (cached by SW after first load) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <!-- App (Babel compiles at runtime; SW caches the compiled result) -->
  <script type="text/babel" data-presets="react" src="app.jsx"></script>

  <script>
    // Remove splash once React mounts
    window.__wayleReady = function() {
      const s = document.getElementById('splash');
      if (s) { s.style.opacity = '0'; setTimeout(() => s.remove(), 300); }
    };

    // Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(reg => {
          // Check for updates
          reg.addEventListener('updatefound', () => {
            const nw = reg.installing;
            nw?.addEventListener('statechange', () => {
              if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                console.log('[Wayle] Update available. Refresh to apply.');
              }
            });
          });
        }).catch(() => {});
      });
    }

    // Remove splash when React renders (via MutationObserver fallback)
    const obs = new MutationObserver(() => {
      if (document.getElementById('root')?.children.length > 0) {
        window.__wayleReady?.();
        obs.disconnect();
      }
    });
    obs.observe(document.getElementById('root'), { childList: true });
    // Hard fallback
    setTimeout(() => window.__wayleReady?.(), 4000);
  </script>
</body>
</html>
