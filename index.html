<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>zywayle</title>
<link rel="preload" href="logo.png" as="image" fetchpriority="high">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --bg: #06080f;
  --bg2: #0b0e18;
  --surface: #0f1220;
  --border: #1c2236;
  --border-bright: #273047;
  --blue: #3b82f6;
  --blue-dim: rgba(59,130,246,.12);
  --cyan: #06b6d4;
  --green: #10b981;
  --green-dim: rgba(16,185,129,.1);
  --yellow: #f59e0b;
  --red: #ef4444;
  --text: #f1f5f9;
  --text-2: #94a3b8;
  --text-3: #4b5563;
  --white: #ffffff;
  --radius: 4px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Grain overlay ── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    radial-gradient(ellipse 80% 60% at 20% -10%, rgba(59,130,246,.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 110%, rgba(6,182,212,.04) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

/* ── Mono util ── */
.mono { font-family: 'JetBrains Mono', monospace; }

/* ── Animations ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes pulseRing {
  0%, 100% { transform: scale(1); opacity: 1; }
  50%       { transform: scale(1.8); opacity: 0; }
}
@keyframes scanline {
  0%   { top: -60px; }
  100% { top: 100%; }
}
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(6px); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

.fade-up   { animation: fadeUp .6s ease both; }
.fade-up-1 { animation: fadeUp .6s .12s ease both; }
.fade-up-2 { animation: fadeUp .6s .24s ease both; }
.fade-up-3 { animation: fadeUp .6s .36s ease both; }

/* ── Layout ── */
.page-wrap { position: relative; z-index: 1; }
.container {
  max-width: 1200px;
  width: 100%;
  margin: 0 auto;
  padding: 0 1.25rem;
}
@media (min-width: 640px) { .container { padding: 0 2rem; } }
@media (min-width: 1024px) { .container { padding: 0 2.5rem; } }

/* ── Nav ── */
nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(6,8,15,.88);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
}
.nav-inner {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1rem 0;
}
.nav-logo {
  display: flex; align-items: center; gap: .55rem;
  cursor: pointer; text-decoration: none; user-select: none;
}
.nav-logo img {
  width: 30px; height: 30px; object-fit: contain;
  filter: drop-shadow(0 0 10px rgba(59,130,246,.3));
}
.nav-logo-text {
  font-size: 1.2rem; font-weight: 700;
  color: var(--white); letter-spacing: -.3px;
}
.nav-links { display: none; gap: 2rem; align-items: center; }
@media (min-width: 768px) { .nav-links { display: flex; } }

.nav-link {
  font-size: .82rem; font-weight: 500; color: var(--white);
  cursor: pointer; border: none; background: none;
  font-family: 'Outfit', sans-serif;
  letter-spacing: .01em;
  transition: color .2s ease, opacity .2s ease;
  padding: .25rem 0; position: relative;
  opacity: .75;
}
.nav-link::after {
  content: ''; position: absolute; bottom: -2px; left: 0;
  width: 0; height: 1px;
  background: var(--white);
  transition: width .25s ease;
}
.nav-link:hover { color: var(--white); opacity: 1; }
.nav-link:hover::after { width: 100%; }
.nav-link.accent { color: var(--green); opacity: 1; }
.nav-link.accent::after { background: var(--green); }
.nav-link.accent:hover { color: var(--green); opacity: .85; }

.nav-right { display: flex; align-items: center; gap: .75rem; }

.nav-badge {
  display: none; align-items: center; gap: .45rem;
  background: var(--blue-dim);
  border: 1px solid rgba(59,130,246,.2);
  padding: .3rem .7rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: .65rem; color: var(--text-2);
  border-radius: var(--radius);
  cursor: pointer;
  transition: border-color .2s;
}
.nav-badge:hover { border-color: var(--blue); color: var(--text); }
@media (min-width: 640px) { .nav-badge { display: flex; } }

/* hamburger */
.hamburger {
  display: flex; align-items: center; justify-content: center;
  width: 36px; height: 36px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); cursor: pointer;
  transition: border-color .2s;
}
.hamburger:hover { border-color: var(--border-bright); }
@media (min-width: 768px) { .hamburger { display: none; } }

.mobile-menu {
  border-top: 1px solid var(--border);
  background: rgba(6,8,15,.97);
  animation: fadeIn .15s ease;
}
.mob-link {
  display: flex; align-items: center;
  padding: .9rem 1.25rem;
  border-bottom: 1px solid rgba(28,34,54,.6);
  font-size: .9rem; font-weight: 500; color: var(--text-2);
  cursor: pointer;
  transition: color .15s, background .15s;
}
.mob-link:hover { color: var(--white); background: rgba(59,130,246,.04); }
.mob-link.accent { color: var(--green); }

/* ── Hero ── */
.hero {
  position: relative; min-height: 100vh;
  display: flex; align-items: center;
  justify-content: flex-start;
  overflow: hidden;
}
#particles-canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  z-index: 1; opacity: .45;
  pointer-events: none;
}

.hero-title {
  font-size: clamp(4rem, 11vw, 8rem);
  font-weight: 800;
  line-height: .9;
  letter-spacing: -4px;
  margin-bottom: 1.75rem;
  text-align: left;
}
@media (max-width: 480px) {
  .hero-title { font-size: clamp(3.2rem, 16vw, 5rem); letter-spacing: -2px; }
}

.gradient-text {
  background: linear-gradient(135deg, #fff 0%, #93c5fd 40%, var(--cyan) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  font-size: 1.1rem; color: var(--text-2);
  line-height: 1.85; max-width: 34rem;
  margin-bottom: 2.25rem;
  font-weight: 400;
  text-align: left;
}

.hero-actions {
  display: flex; flex-wrap: wrap; gap: .65rem;
  margin-bottom: 2.5rem;
}

.scroll-hint {
  position: absolute; bottom: 2rem; left: 50%;
  transform: translateX(-50%);
  z-index: 2;
  display: flex; flex-direction: column; align-items: center; gap: .3rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: .55rem; letter-spacing: .2em; color: var(--text-3);
}
.bounce { animation: bounce 2s ease-in-out infinite; }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; gap: .45rem;
  cursor: pointer; border: none; outline: none;
  font-family: 'Outfit', sans-serif;
  font-weight: 600; letter-spacing: .03em;
  font-size: .82rem;
  border-radius: var(--radius);
  transition: all .2s ease;
  white-space: nowrap;
}
.btn-primary {
  background: var(--blue); color: #fff;
  padding: .8rem 1.6rem;
  box-shadow: 0 0 0 rgba(59,130,246,0);
}
.btn-primary:hover {
  background: #2563eb;
  box-shadow: 0 0 28px rgba(59,130,246,.3);
  transform: translateY(-1px);
}
.btn-ghost {
  background: transparent;
  border: 1px solid var(--border-bright);
  color: var(--text-2); padding: .8rem 1.6rem;
}
.btn-ghost:hover {
  border-color: var(--blue); color: var(--blue);
  background: var(--blue-dim);
}
.btn-full { width: 100%; justify-content: center; }
.btn-sm { padding: .5rem 1rem; font-size: .78rem; }

/* ── Terminal line ── */
.tline {
  display: flex; align-items: center; gap: .5rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: .7rem; color: var(--text-3);
}
.tline::before {
  content: '›'; color: var(--cyan);
  font-weight: 600; flex-shrink: 0;
}

/* ── Pulse dot ── */
.pulse-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green);
  position: relative; flex-shrink: 0;
}
.pulse-dot::after {
  content: ''; position: absolute; inset: 0;
  border-radius: 50%; background: var(--green);
  animation: pulseRing 2.2s ease-in-out infinite;
}

/* ── Badge ── */
.badge {
  display: inline-flex; align-items: center; gap: .35rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: .62rem; color: var(--text-2);
  padding: .18rem .55rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
}

/* ── Cards ── */
.card {
  width: 100%;
  box-sizing: border-box;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  transition: border-color .25s;
}
.card:hover { border-color: var(--border-bright); }

.card-green {
  background: linear-gradient(135deg, rgba(16,185,129,.05), rgba(59,130,246,.03));
  border: 1px solid rgba(16,185,129,.18);
  border-radius: var(--radius);
  position: relative; overflow: hidden;
}
.card-green::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(16,185,129,.45), transparent);
}

/* scan effect */
.scan-wrap { position: relative; overflow: hidden; }
.scan-wrap::after {
  content: ''; position: absolute;
  left: 0; right: 0; height: 60px;
  background: linear-gradient(to bottom, transparent, rgba(59,130,246,.02), transparent);
  animation: scanline 6s linear infinite;
  pointer-events: none;
}

/* ── Section spacing ── */
.section { padding: 5.5rem 0; }

/* ── Models grid ── */
.models-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.model-cell {
  background: var(--surface);
  padding: 1.75rem;
  display: flex; flex-direction: column;
  transition: background .2s;
}
.model-cell:hover { background: var(--bg2); }

/* ── About grid ── */
.about-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
  gap: 4rem; align-items: center;
}
@media (max-width: 768px) { .about-grid { gap: 2.5rem; } }

/* ── Info boxes ── */
.info-box {
  padding: 1.1rem 1.25rem;
  border-radius: var(--radius);
  display: flex; align-items: flex-start; gap: .65rem;
}
.info-box.blue {
  background: rgba(59,130,246,.05);
  border: 1px solid rgba(59,130,246,.15);
}
.info-box.yellow {
  background: rgba(245,158,11,.04);
  border: 1px solid rgba(245,158,11,.15);
}
.info-box.red {
  background: rgba(239,68,68,.04);
  border: 1px solid rgba(239,68,68,.14);
}
.info-box p { font-size: .82rem; color: var(--text-2); line-height: 1.7; }

/* ── Steps grid ── */
.steps-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 1.5rem;
}

/* ── Code block ── */
.code-block {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  display: flex; align-items: center;
  justify-content: space-between; gap: 1rem;
  flex-wrap: wrap;
}
.code-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: .8rem; color: var(--cyan);
  word-break: break-all;
}

/* ── GitHub button ── */
.github-btn {
  display: inline-flex; align-items: center; gap: .55rem;
  background: var(--green-dim);
  border: 1px solid rgba(16,185,129,.25);
  color: var(--green); padding: .75rem 1.35rem;
  font-size: .78rem; font-family: 'JetBrains Mono', monospace;
  letter-spacing: .04em; transition: all .2s;
  text-decoration: none; border-radius: var(--radius);
  font-weight: 500;
}
.github-btn:hover {
  background: rgba(16,185,129,.15);
  box-shadow: 0 0 20px rgba(16,185,129,.12);
}

/* ── Copy button ── */
.copy-btn {
  display: inline-flex; align-items: center; gap: .35rem;
  background: rgba(59,130,246,.08);
  border: 1px solid var(--border);
  color: var(--text-2); padding: .35rem .75rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: .68rem; cursor: pointer;
  border-radius: var(--radius); transition: all .2s;
  white-space: nowrap;
}
.copy-btn:hover { border-color: var(--blue); color: var(--blue); }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 1.75rem; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface);
  border: 1px solid var(--border-bright);
  color: var(--text);
  padding: .7rem 1.3rem;
  font-size: .78rem;
  font-family: 'JetBrains Mono', monospace;
  z-index: 9999;
  display: flex; align-items: center; gap: .55rem;
  transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s ease;
  white-space: nowrap;
  box-shadow: 0 8px 40px rgba(0,0,0,.5);
  border-radius: var(--radius);
  opacity: 0;
  pointer-events: none;
}
.toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
  pointer-events: auto;
}

/* ── Back link ── */
.back-link {
  display: inline-flex; align-items: center; gap: .4rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: .7rem; color: var(--text-3);
  cursor: pointer; margin-bottom: 2.5rem;
  transition: color .15s; background: none; border: none;
}
.back-link:hover { color: var(--text-2); }

/* ── Footer ── */
footer {
  background: var(--bg2);
  border-top: 1px solid var(--border);
  padding: 2.5rem 0;
}
.footer-inner {
  display: flex; flex-wrap: wrap;
  justify-content: space-between; align-items: center;
  gap: 1.5rem;
}

/* ── Download grid with clearly defined lines & perfect width ── */
.dl-grid {
  width: 100%;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 1.25rem;
}
.dl-header-row, .dl-row {
  display: grid;
  grid-template-columns: minmax(180px, 2fr) 1fr 1fr 1fr 1fr 120px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
}
.dl-row:last-child {
  border-bottom: none;
}
.dl-header-row {
  background: var(--surface);
  cursor: default;
}
.dl-row {
  background: var(--bg);
  transition: background .2s;
}
.dl-row:hover {
  background: var(--bg2);
}
.dl-row.active {
  background: var(--bg2);
  border-left: 2px solid var(--blue);
}
.dl-cell {
  padding: 1.25rem 1.5rem;
  border-right: 1px solid var(--border);
  display: flex;
  align-items: center;
}
.dl-header-row .dl-cell {
  padding: .8rem 1.5rem;
}
.dl-cell:last-child {
  border-right: none;
  justify-content: flex-end;
}

/* Hide specific columns cleanly on mobile */
@media (max-width: 900px) {
  .dl-header-row, .dl-row {
    grid-template-columns: 1fr auto auto; /* Fold layout */
  }
  .dl-hide-mobile {
    display: none !important;
  }
  .dl-cell {
    padding: 1rem;
  }
}

.dl-col-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: .58rem; color: var(--text-3);
  letter-spacing: .12em; text-transform: uppercase;
}
.dl-name {
  font-family: 'JetBrains Mono', monospace;
  font-size: .78rem; color: var(--text);
  font-weight: 600; word-break: break-all;
}
.dl-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: .82rem; color: var(--text-2);
}
.dl-size {
  font-size: 1rem; font-weight: 700;
  color: var(--white); letter-spacing: -.02em;
  font-family: 'Outfit', sans-serif;
}
.dl-btn-inline {
  display: inline-flex; align-items: center; gap: .4rem;
  background: var(--blue); color: #fff;
  padding: .55rem 1.1rem;
  font-size: .75rem; font-weight: 600;
  font-family: 'Outfit', sans-serif;
  border: none; border-radius: var(--radius);
  cursor: pointer; white-space: nowrap;
  transition: background .2s, box-shadow .2s;
}
.dl-btn-inline:hover {
  background: #2563eb;
  box-shadow: 0 0 20px rgba(59,130,246,.3);
}

/* ── Responsive text ── */
@media (max-width: 640px) {
  .section { padding: 4rem 0; }
  .hero-sub { font-size: 1rem; }
}
</style>
</head>

/* ── Particle Canvas ── */
function ParticleCanvas() {
  const canvasRef = useRef(null);
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let W = 0, H = 0, pts = [], raf;

    class Pt {
      constructor(init) {
        this.x = Math.random() * W;
        this.y = init ? Math.random() * H : H + 8;
        this.r = Math.random() * 1.5 + .3;
        this.vx = (Math.random() - .5) * .3;
        this.vy = -(Math.random() * .5 + .15);
        this.hue = 200 + Math.random() * 40;
        this.a = Math.random() * .35 + .1;
      }
      step() {
        this.x += this.vx; this.y += this.vy;
        if (this.y < -8 || this.x < -8 || this.x > W + 8) Object.assign(this, new Pt(false));
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${this.hue},85%,68%,${this.a})`;
        ctx.fill();
      }
    }

    function resize() {
      const hero = canvas.parentElement;
      W = canvas.width = hero.offsetWidth;
      H = canvas.height = hero.offsetHeight;
      const n = Math.min(Math.floor(W * H / 16000), 70);
      while (pts.length < n) pts.push(new Pt(true));
      pts.length = Math.min(pts.length, n);
    }

    function frame() {
      ctx.clearRect(0, 0, W, H);
      for (let i = 0; i < pts.length; i++) {
        for (let j = i + 1; j < pts.length; j++) {
          const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
          const d = Math.sqrt(dx*dx + dy*dy);
          if (d < 90) {
            ctx.beginPath();
            ctx.moveTo(pts[i].x, pts[i].y);
            ctx.lineTo(pts[j].x, pts[j].y);
            ctx.strokeStyle = `rgba(59,130,246,${.07*(1-d/90)})`;
            ctx.lineWidth = .5;
            ctx.stroke();
          }
        }
      }
      pts.forEach(p => { p.step(); p.draw(); });
      raf = requestAnimationFrame(frame);
    }

    window.addEventListener('resize', resize);
    resize(); frame();
    return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };
  }, []);
  return <canvas ref={canvasRef} id="particles-canvas" />;
}

          <div className="steps-grid" style={{marginBottom: '1.5rem'}}>
            {[
              {n:'01',title:'Fork the repo',body:'Head to GitHub and fork the zyydata repository to your own account.'},
              {n:'02',title:'Add your data',body:"Check the README for formatting. Structure entries cleanly to maintain data integrity."},
              {n:'03',title:'Open a PR',body:'Submit a pull request. We merge validated data directly into the central training structure.'},
            ].map(s => (
              <div key={s.n} style={{padding:'1.1rem',background:'var(--bg2)',borderRadius:'4px',border:'1px solid var(--border)'}}>
                <div className="mono" style={{fontSize:'1.6rem',fontWeight:700,color:'var(--blue)',marginBottom:'.4rem',letterSpacing:'-.03em'}}>{s.n}</div>
                <div style={{fontWeight:600,marginBottom:'.4rem',fontSize:'.95rem'}}>{s.title}</div>
                <p style={{fontSize:'.82rem',color:'var(--text-2)',lineHeight:1.65}}>{s.body}</p>
              </div>
            ))}
          </div>

          {/* Web interface alternative */}
          <div style={{padding:'1.1rem 1.25rem', background:'var(--blue-dim)', border:'1px dashed rgba(59,130,246,0.3)', borderRadius:'var(--radius)', display:'flex', alignItems:'center', gap:'1rem', flexWrap:'wrap'}}>
            <div style={{color:'var(--blue)'}}><IconCodeFork /></div>
            <p style={{color:'var(--text)', fontSize:'.88rem', margin:0, flex:1}}>
              <strong style={{fontWeight:600}}>Alternative:</strong> Use the GitHub web interface and directly push your code into our database without cloning locally.
            </p>
            <a href="https://github.com/zywayle/zyydata" target="_blank" rel="noopener" className="btn btn-sm btn-primary">
              Web Interface <IconArrow dir="right" />
            </a>
          </div>
        </div>

        {/* Data ownership */}
        <div className="info-box yellow">
          <span style={{color:'var(--yellow)',flexShrink:0,marginTop:'1px'}}><IconAlert /></span>
          <p>
            <strong style={{color:'var(--text)'}}>Data ownership:</strong> The dataset itself is public and openly licensed. Contributed data is merged into the zywayle public foundation structure. The trained <em>model weights</em> remain closed source and part of our proprietary AI program.{' '}
            <a href="https://github.com/zywayle/zyydata#readme" target="_blank" rel="noopener" style={{color:'var(--blue)'}}>Read full terms →</a>
          </p>
        </div>
      </div>
      <SiteFooter setPage={setPage} />
    </div>
  );
}

/* ── Footer ── */

  return (
    <footer>
      <div className="container">
        <div className="footer-inner">
          <div>
            <div style={{display:'flex',alignItems:'center',gap:'.5rem',marginBottom:'.35rem'}}>
              <img src="logo.png" alt="zywayle" style={{width:'22px',height:'22px',objectFit:'contain'}} />
              <span style={{fontSize:'1rem',fontWeight:700,color:'var(--white)'}}>zywayle</span>
            </div>
            <p className="mono" style={{fontSize:'.65rem',color:'var(--text-3)'}}>scalable algorithm program</p>
          </div>

          <div style={{display:'flex',flexWrap:'wrap',gap:'1.5rem',alignItems:'center'}}>
            {[
              {href:'https://x.com/zywayle',label:'𝕏 / @zywayle'},
            ].map(l => (
              <a key={l.href} href={l.href} target="_blank" rel="noopener"
                 style={{fontFamily:"'JetBrains Mono',monospace",fontSize:'.7rem',color:'var(--text-3)',display:'flex',alignItems:'center',gap:'.3rem',textDecoration:'none',transition:'color .15s'}}
                 onMouseOver={e=>e.currentTarget.style.color='var(--text)'}
                 onMouseOut={e=>e.currentTarget.style.color='var(--text-3)'}>
                {l.label}
              </a>
            ))}
            <a href="https://github.com/zywayle/zyydata" target="_blank" rel="noopener"
               style={{fontFamily:"'JetBrains Mono',monospace",fontSize:'.7rem',color:'var(--text-3)',display:'flex',alignItems:'center',gap:'.35rem',textDecoration:'none',transition:'color .15s'}}
               onMouseOver={e=>e.currentTarget.style.color='var(--text)'}
               onMouseOut={e=>e.currentTarget.style.color='var(--text-3)'}>
              <IconGithub size={13} /> database
            </a>
            <button className="mono" style={{fontSize:'.7rem',color:'var(--green)',background:'none',border:'none',cursor:'pointer',transition:'opacity .15s'}}
                    onMouseOver={e=>e.currentTarget.style.opacity='.7'}
                    onMouseOut={e=>e.currentTarget.style.opacity='1'}
                    onClick={() => setPage('contribute')}>
              contribute logic
            </button>
          </div>

          <div className="mono" style={{fontSize:'.65rem',color:'var(--text-3)'}}>© 2026 zywayle program</div>
        </div>
      </div>

}

/* ── App ── */
function App() {
  const [page, setPage] = useState('main');
  const [toast, setToast] = useState({visible:false,msg:''});
  const timer = useRef(null);

  const showToast = useCallback(msg => {
    setToast({visible:true,msg});
    clearTimeout(timer.current);
    timer.current = setTimeout(() => setToast(t => ({...t,visible:false})), 3000);
  }, []);

  const navigate = useCallback(p => {
    setPage(p);
    window.scrollTo({top:0,behavior:'smooth'});
  }, []);

  return (
    <>
      <Navbar page={page} setPage={navigate} />
      {page === 'main'       && <MainPage      setPage={navigate} showToast={showToast} />}
      {page === 'downloads'  && <DownloadsPage setPage={navigate} showToast={showToast} />}
      {page === 'contribute' && <ContributePage setPage={navigate} showToast={showToast} />}
      <Toast msg={toast.msg} visible={toast.visible} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
