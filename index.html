<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wayleai Migration Notice</title>

  <!-- Space Grotesk font -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">

  <!-- Google Material Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background-color: #ffffff;
      color: #000000;
      font-family: 'Space Grotesk', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .icon {
      font-size: 64px;
      color: #ff9800; /* warning color */
      margin-bottom: 20px;
    }

    h1 {
      font-weight: 700; /* thicker main text */
      font-size: 24px;
      line-height: 1.5;
      max-width: 600px;
      margin: 0 20px;
    }

    .url {
      font-weight: 400; /* lighter weight for the URL */
    }
  </style>
</head>
<body>
  <span class="material-icons icon">warning</span>
  <h1>
    Our service Wayleai (<span class="url">zywayle.github.io</span>) was migrated to Cloudflare Pages.
  </h1>
</body>
</html>
