async function cachedLogo() {
  try {
    if ('caches' in window) {
      const c = await caches.open('wayle-assets-v1');
      const hit = await c.match(LOGO_URL);
      if (hit) return URL.createObjectURL(await hit.blob());
      const res = await fetch(LOGO_URL);
      if (res.ok) { c.put(LOGO_URL, res.clone()); return URL.createObjectURL(await res.blob()); }
    }
  } catch {}
  return LOGO_URL;
}

async function detectCaps() {
  const ua = navigator.userAgent;
  const isMobile = /Mobi|Android|iPhone|iPad/.test(ua);
  let hasWebGPU = false, gpuInfo = null;
  try {
    if (navigator.gpu) {
      const a = await navigator.gpu.requestAdapter({ powerPreference:'high-performance' });
      if (a) { hasWebGPU = true; const info = await a.requestAdapterInfo().catch(()=>({})); gpuInfo = info?.description || info?.vendor || 'GPU active'; }
    }
  } catch {}
  return { isMobile, hasWebGPU, gpuInfo, hasSAB: typeof SharedArrayBuffer !== 'undefined', ram: navigator.deviceMemory || 4 };
}

class InferenceWorker {
  constructor() { this.w=null; this.pending=new Map(); this.streams=new Map(); this.n=0; }
  init() {
    this.w = new Worker('inference_worker.js'); // FIXED filename
    this.w.onmessage = ({ data }) => {
      const { type, id } = data;
      const req = this.pending.get(id); const st = this.streams.get(id);
      switch(type) {
        case 'load_progress': req?.onProgress?.(data); break;
        case 'load_done': req?.resolve(data); this.pending.delete(id); break;
        case 'load_error': req?.reject(new Error(data.error)); this.pending.delete(id); break;
        case 'token': st?.onToken(data.token, data.stats); break;
        case 'done': st?.onDone(data.stats); this.streams.delete(id); this.pending.delete(id); break;
        case 'generate_error': st?.onError(new Error(data.error)); this.streams.delete(id); this.pending.delete(id); break;
        case 'aborted': st?.onDone({aborted:true}); this.streams.delete(id); this.pending.delete(id); break;
        default: req?.resolve(data); this.pending.delete(id);
      }
    };
    this.w.onerror = e => console.error('[Worker]', e);
  }
  send(type, payload, onProgress) {
    return new Promise((resolve, reject) => {
      const id = ++this.n;
      this.pending.set(id, { resolve, reject, onProgress });
      this.w.postMessage({ type, id, ...payload });
    });
  }
  generate(prompt, opts, { onToken, onDone, onError }) {
    const id = ++this.n;
    this.streams.set(id, { onToken, onDone, onError });
    this.pending.set(id, {});
    this.w.postMessage({ type:'generate', id, prompt, options:opts });
    return id;
  }
  abort(id) { this.w.postMessage({ type:'abort', id }); }
  loadModel(mid, onProgress) { return this.send('load_model', { modelId:mid }, onProgress); }
  resetKV() { return this.send('reset_kv', {}); }
  terminate() { this.w?.terminate(); }
}

function md(text) {
  if (!text) return '';
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```([\w]*)\n?([\s\S]*?)```/g,(_,l,c)=>`<pre class="cb"><span class="cl">${l||'code'}</span><code>${c.trim()}</code></pre>`)
    .replace(/`([^`]+)`/g,'<code class="ic">$1</code>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g,'<em>$1</em>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/^[-*] (.+)$/gm,'<li>$1</li>').replace(/(<li>.*<\/li>\n?)+/g,m=>`<ul>${m}</ul>`)
    .replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br/>')
    .replace(/^(?!<[hupol])(.+)/,'<p>$1').replace(/([^>])$/,'$1</p>');
}

// Word-by-word blur-in streaming renderer
function StreamingText({ content, streaming }) {
  const prevWordsRef = useRef(0);
  const tokens = useMemo(() => {
    // Split into words but keep spaces
    return content.split(/(\s+)/);
  }, [content]);

  useEffect(() => {
    if (!streaming) prevWordsRef.current = tokens.length;
  }, [streaming, tokens.length]);

  if (!streaming) {
    // Render final content with full markdown
    return <span dangerouslySetInnerHTML={{__html: md(content) + ''}} />;
  }

  // During streaming: render words with blur-in for new ones
  const prevCount = prevWordsRef.current;
  return (
    <span>
      {tokens.map((tok, i) => {
        const isNew = i >= prevCount;
        if (/^\s+$/.test(tok)) return tok;
        return <span key={i} className={isNew ? 'word-token' : ''} style={isNew ? {animationDelay:`${(i-prevCount)*0.04}s`} : {}}>{tok}</span>;
      })}
      <span className="cur"/>
    </span>
  );
}

function App() {
  const [view, setView] = useState('chat');
  const [msgs, setMsgs] = useState([]);
  const [input, setInput] = useState('');
  const [curMod, setCurMod] = useState(MODELS[1]);
  const [loadedModel, setLoadedModel] = useState(null);
  const [engState, setEngState] = useState('idle');
  const [loadProg, setLoadProg] = useState({ text:'', percent:0 });
  const [streaming, setStreaming] = useState(false);
  const [streamStats, setStreamStats] = useState(null);
  const [logo, setLogo] = useState(LOGO_URL);
  const [toast, setToast] = useState(null);
  const [caps, setCaps] = useState(null);
  const [gated, setGated] = useState(false);
  const [attachedImage, setAttachedImage] = useState(null); // {dataUrl, ocrText, ocrDone}
  const [ocrLoading, setOcrLoading] = useState(false);
  const wRef = useRef(null); const genIdRef = useRef(null);
  const taRef = useRef(null); const botRef = useRef(null);
  const fileRef = useRef(null);

  useEffect(() => {
    // Dismiss splash
    const splash = document.getElementById('splash');
    if (splash) { splash.style.animation = 'sOut .4s ease forwards'; setTimeout(()=>splash.remove(), 420); }
    document.getElementById('root').style.display = '';

    cachedLogo().then(setLogo);
    detectCaps().then(c => { setCaps(c); if (!c.hasWebGPU) setGated(true); });
    try { const w = new InferenceWorker(); w.init(); wRef.current = w; } catch(e) { console.warn('Worker:', e); }
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
    return () => wRef.current?.terminate();
  }, []);

  const toast$ = useCallback((m, ms=2800) => { setToast(m); setTimeout(()=>setToast(null), ms); }, []);

  useEffect(() => {
    requestAnimationFrame(()=>botRef.current?.scrollIntoView({behavior:'smooth',block:'end'}));
  }, [msgs.length, streaming]);

  const resize = useCallback(() => {
    const el = taRef.current; if (!el) return;
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }, []);

  const loadModel = useCallback(async (m) => {
    if (!wRef.current) return;
    setCurMod(m); setEngState('loading'); setLoadProg({ text:'Initializing…', percent:0 });
    try {
      await wRef.current.loadModel(m.id, p => setLoadProg({ text:p.text, percent:p.percent }));
      setLoadedModel(m.id); setEngState('ready'); toast$(`${m.label} loaded ✓`);
    } catch(e) {
      setEngState('error');
      if (e.message === 'NO_WEBGPU') setGated(true);
      else toast$(`Load failed: ${e.message}`);
    }
  }, [toast$]);

  // OCR: extract text from image using canvas
  const runOCR = useCallback(async (dataUrl) => {
    setOcrLoading(true);
    try {
      // Use browser's built-in canvas to get image data, then use Tesseract if available
      // Fallback: just flag as image attached, prepend description to prompt
      if (window.Tesseract) {
        const result = await window.Tesseract.recognize(dataUrl, 'eng');
        const text = result.data.text.trim();
        setAttachedImage(prev => prev ? {...prev, ocrText: text, ocrDone: true} : null);
        if (text) toast$('Text detected from image ✓');
      } else {
        setAttachedImage(prev => prev ? {...prev, ocrText: null, ocrDone: true} : null);
      }
    } catch(e) {
      setAttachedImage(prev => prev ? {...prev, ocrText: null, ocrDone: true} : null);
    }
    setOcrLoading(false);
  }, [toast$]);

  const handleImageFile = useCallback((file) => {
    if (!file || !file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      const dataUrl = e.target.result;
      setAttachedImage({ dataUrl, ocrText: null, ocrDone: false });
      runOCR(dataUrl);
    };
    reader.readAsDataURL(file);
  }, [runOCR]);

  const handleSend = useCallback(async () => {
    const text = input.trim();
    if ((!text && !attachedImage) || streaming) return;
    if (engState === 'idle') { setInput(''); await loadModel(curMod); return; }
    if (engState === 'loading') { toast$('Still loading — please wait'); return; }
    const uid = () => crypto.randomUUID?.() || Math.random().toString(36).slice(2);
    // Build prompt: prepend OCR text if detected
    let prompt = text;
    if (attachedImage?.ocrText) prompt = `[Image text detected]: ${attachedImage.ocrText}\n\n${text || 'Please describe what you see in this text.'}`;
    else if (attachedImage && !attachedImage.ocrText) prompt = text || 'I attached an image.';
    const uMsg = { role:'user', content: text || '📷 Image attached', image: attachedImage?.dataUrl, ts:Date.now(), id:uid() };
    setMsgs(p=>[...p, uMsg]);
    setInput(''); setAttachedImage(null);
    if (taRef.current) taRef.current.style.height = 'auto';
    const aMsg = { role:'assistant', content:'', ts:Date.now(), id:uid() };
    setMsgs(p=>[...p, aMsg]);
    setStreaming(true); setStreamStats(null);
    const gid = wRef.current.generate(prompt, { maxTokens:512, temperature:0.7, topP:0.9, topK:40 }, {
      onToken: (tok, stats) => {
        setStreamStats(stats);
        setMsgs(p=>{ const c=[...p]; const l=c[c.length-1]; if(l.role==='assistant') c[c.length-1]={...l,content:l.content+tok}; return c; });
      },
      onDone: (stats) => {
        setStreaming(false); genIdRef.current=null;
        setMsgs(p=>{ const c=[...p]; const l=c[c.length-1]; if(l.role==='assistant') c[c.length-1]={...l,tps:stats?.totalMs?(stats.totalTokens/stats.totalMs*1000):null}; return c; });
      },
      onError: (e) => {
        setStreaming(false); genIdRef.current=null; toast$(`Error: ${e.message}`);
        setMsgs(p=>{ const c=[...p]; const l=c[c.length-1]; if(l.role==='assistant'&&!l.content) c[c.length-1]={...l,content:'⚠️ Generation failed.'}; return c; });
      },
    });
    genIdRef.current = gid;
  }, [input, attachedImage, streaming, engState, curMod, loadModel, toast$]);

  const handleStop = () => { if (genIdRef.current) wRef.current?.abort(genIdRef.current); setStreaming(false); };
  const handleKey = e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } };
  const canSend = (input.trim().length > 0 || attachedImage !== null) && !streaming && engState !== 'loading';
  const onNewChat = () => { setMsgs([]); setAttachedImage(null); wRef.current?.resetKV(); setView('chat'); };

  const SUGG = ['Explain transformer models simply','Write a haiku about code',"What's 17 × 23?",'Help me debug my app'];
  const TABS = [['chat','chat_bubble','Chat'],['models','memory','Models'],['plans','diamond','Plans']];

  if (gated) return <Gate logo={logo}/>;

  // Hidden file input (supports camera on mobile)
  const ImgInput = (
    <input ref={fileRef} type="file" accept="image/*" capture="environment"
      style={{display:'none'}}
      onChange={e=>{ const f=e.target.files?.[0]; if(f) handleImageFile(f); e.target.value=''; }}/>
  );

  const ChatView = (
    <div className="chat">
      {ImgInput}
      <div className="mbar">
        <button className="mpill" onClick={()=>setView('models')}>
          <span className={`dot ${loadedModel?'on':'off'}`}/>
          {loadedModel ? curMod.label : 'No model loaded'}
          <span className="i s14" style={{marginLeft:2,color:'var(--t3)'}}>expand_more</span>
        </button>
        {streamStats && streaming && <span className="tbadge">{streamStats.tokensPerSec?.toFixed(1)} t/s</span>}
        {engState==='loading' && (
          <div className="pw">
            <div className="mspin"/>
            <span className="pt">{loadProg.text}</span>
            <div className="ptrk"><div className="pfil" style={{width:`${loadProg.percent}%`}}/></div>
          </div>
        )}
      </div>
      <div className="msgs">
        <div className="msgs-in">
          {msgs.length === 0 ? (
            <div className="welcome">
              <div className="wlogo"><img src={logo} alt="Wayle"/></div>
              <div className="wtitle">How can I help?</div>
              {caps?.hasWebGPU && <div className="wgpu"><span className="i f s13">bolt</span>WebGPU · {caps.gpuInfo||'GPU Ready'}</div>}
              <div className="wsub">{loadedModel ? `${curMod.label} · fully offline` : 'Select a model in Models to get started'}</div>
              <div className="chips">
                {SUGG.map(s=>(
                  <button key={s} className="chip" onClick={()=>{ setInput(s); taRef.current?.focus(); }}>{s}</button>
                ))}
              </div>
            </div>
          ) : (
            <>
              {msgs.map((m,i)=>(
                <Msg key={m.id||i} msg={m} logo={logo} streaming={streaming && i===msgs.length-1 && m.role==='assistant'}/>
              ))}
              {streaming && msgs[msgs.length-1]?.role!=='assistant' && <Typing logo={logo}/>}
            </>
          )}
          <div className="spacer"/><div ref={botRef} className="anch"/>
        </div>
      </div>
      <div className="ibar">
        <div className="iwrap">
          {attachedImage && (
            <div className="img-attach">
              <div className="img-preview">
                <img src={attachedImage.dataUrl} alt="attached"/>
                <button className="img-remove" onClick={()=>setAttachedImage(null)}>✕</button>
              </div>
              {ocrLoading && <div className="img-ocr-pill"><div className="ocr-spin"/><span>Reading text…</span></div>}
              {attachedImage.ocrDone && attachedImage.ocrText && <div className="img-ocr-pill"><span className="i f s13">text_fields</span><span>Text detected</span></div>}
              {attachedImage.ocrDone && !attachedImage.ocrText && <div className="img-ocr-pill" style={{color:'var(--t2)',background:'var(--s2)',borderColor:'var(--bdr)'}}><span className="i s13">image</span><span>Image ready</span></div>}
            </div>
          )}
          <div className="ibox">
            <button className="img-btn" title="Attach image or take photo"
              onClick={()=>fileRef.current?.click()}>
              <span className="i s18">add_photo_alternate</span>
            </button>
            <textarea ref={taRef} value={input}
              onChange={e=>{ setInput(e.target.value); resize(); }}
              onKeyDown={handleKey}
              placeholder={loadedModel?'Message Wayle…':'Load a model to start…'}
              rows={1} disabled={streaming} autoComplete="off" autoCorrect="on" spellCheck/>
            {streaming
              ? <button className="snd stop" onClick={handleStop}><span className="i f s18">stop</span></button>
              : <button className="snd" onClick={handleSend} disabled={!canSend}>
                  {engState==='loading' ? <div className="bspin"/> : <span className="i f s18">arrow_upward</span>}
                </button>
            }
          </div>
          <div className="ihint">Wayle runs 100% on your device · no data sent anywhere</div>
        </div>
      </div>
    </div>
  );

  return (
    <div className="app">
      <aside className="sidebar">
        <button className="sb-brand" onClick={()=>setView('chat')}>
          <div className="sb-logo"><img src={logo} alt="Wayle"/></div>
          <span className="sb-name">Wayle</span>
        </button>
        <nav className="sb-nav">
          {TABS.map(([id,ic,lb])=>(
            <button key={id} className={`stab ${view===id?'on':''}`} onClick={()=>setView(id)}>
              <span className={`i ${view===id?'f':''}`}>{ic}</span>{lb}
            </button>
          ))}
        </nav>
        <div className="sb-bot">
          <button className="nc" onClick={onNewChat}>
            <span className="i" style={{fontSize:17}}>add_comment</span>New chat
          </button>
        </div>
      </aside>

      <div className="main">
        <div className="mtop">
          <div className="mb">
            <div className="mb-logo"><img src={logo} alt="Wayle"/></div>
            <span className="mb-name">Wayle</span>
          </div>
          <button className="ib" onClick={onNewChat}><span className="i s18">add_comment</span></button>
        </div>

        <div className="cnt">
          {view==='chat' && ChatView}
          {view==='models' && <ModelsView caps={caps} curMod={curMod} loadedModel={loadedModel} engState={engState} loadProg={loadProg} onLoad={m=>{ loadModel(m); setView('chat'); }}/>}
          {view==='plans' && <PlansView/>}
        </div>

        <nav className="mbn" style={{display:'flex'}}>
          {TABS.map(([id,ic,lb])=>(
            <button key={id} className={`btab ${view===id?'on':''}`} onClick={()=>setView(id)}>
              <span className={`i ${view===id?'f':''} s22`}>{ic}</span>{lb}
            </button>
          ))}
        </nav>
      </div>

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
