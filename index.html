<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Zywayle · AI Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/tesseract.js@4/dist/tesseract.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;
  --bg2:#111111;
  --bg3:#181818;
  --bg4:#202020;
  --bg5:#282828;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.12);
  --border3:rgba(255,255,255,0.2);
  --text:#eeece8;
  --text2:#8a8680;
  --text3:#4a4744;
  --text4:#2e2c2a;
  --accent:#9b7dff;
  --accent-h:#8b6af0;
  --accent2:#3ddc84;
  --accent3:#f0a500;
  --accentbg:rgba(155,125,255,0.07);
  --accentbd:rgba(155,125,255,0.22);
  --sidebar-w:260px;
  --font:'Space Grotesk',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
html,body,#root{width:100%;height:100%;overflow:hidden;background:var(--bg);}
body{font-family:var(--font);color:var(--text);-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:2px;height:2px}
::-webkit-scrollbar-thumb{background:var(--bg5);}
::-webkit-scrollbar-track{background:transparent;}

/* ── LAYOUT ── */
.app{display:flex;height:100vh;overflow:hidden;}
.sidebar-overlay{display:none;position:fixed;inset:0;z-index:40;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);}
.sidebar-overlay.open{display:block;}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;z-index:50;
  position:relative;
}
.sidebar::after{
  content:'';position:absolute;top:0;right:0;bottom:0;width:1px;
  background:linear-gradient(to bottom,transparent,rgba(155,125,255,0.15) 30%,rgba(155,125,255,0.15) 70%,transparent);
  pointer-events:none;
}
@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;height:100%;transform:translateX(-100%);transition:transform 0.24s cubic-bezier(0.16,1,0.3,1);box-shadow:8px 0 48px rgba(0,0,0,0.6);}
  .sidebar.open{transform:translateX(0);}
}

/* Sidebar header */
.sidebar-header{
  padding:18px 16px 16px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:11px;flex-shrink:0;
}
.logo-mark{
  width:32px;height:32px;flex-shrink:0;
  background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:10px;font-weight:500;color:#fff;letter-spacing:-0.5px;
  box-shadow:0 0 20px rgba(155,125,255,0.3),inset 0 1px 0 rgba(255,255,255,0.15);
  transition:transform 0.2s,box-shadow 0.2s;cursor:default;
  clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,6px 100%,0 calc(100% - 6px));
}
.logo-mark:hover{transform:scale(1.07);box-shadow:0 0 28px rgba(155,125,255,0.45);}
.logo-text{font-size:15px;font-weight:700;letter-spacing:-0.4px;color:var(--text);}
.logo-sub{font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:1px;letter-spacing:0.5px;}

/* Sidebar body */
.sidebar-body{flex:1;overflow-y:auto;padding:12px 10px;}
.new-btn{
  display:flex;align-items:center;gap:8px;width:100%;
  padding:9px 12px;margin-bottom:10px;
  background:transparent;border:1px solid var(--border2);
  color:var(--text2);font-family:var(--font);font-size:12px;font-weight:600;
  cursor:pointer;transition:all 0.14s;letter-spacing:0.2px;
  position:relative;overflow:hidden;
}
.new-btn::before{content:'';position:absolute;inset:0;background:var(--accent);opacity:0;transition:opacity 0.14s;}
.new-btn:hover{border-color:var(--accentbd);color:var(--text);}
.new-btn:hover::before{opacity:0.05;}
.new-btn-icon{font-size:14px;flex-shrink:0;}

.sec-label{
  font-size:9px;font-weight:600;color:var(--text4);
  letter-spacing:2px;text-transform:uppercase;
  padding:10px 8px 4px;
}

.chat-row{
  display:flex;align-items:center;gap:7px;
  padding:7px 10px;cursor:pointer;
  transition:background 0.1s;border:1px solid transparent;
  margin-bottom:1px;
}
.chat-row:hover{background:var(--bg3);border-color:var(--border);}
.chat-row.active{background:var(--bg3);border-color:var(--border2);}
.chat-row-dot{width:5px;height:5px;flex-shrink:0;background:var(--text4);}
.chat-row.active .chat-row-dot{background:var(--accent);}
.chat-row-text{flex:1;font-size:12px;color:var(--text2);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;line-height:1.4;}
.chat-row.active .chat-row-text{color:var(--text);}
.chat-del{
  opacity:0;width:18px;height:18px;background:transparent;border:none;
  color:var(--text3);font-size:15px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;transition:color 0.1s;
}
.chat-row:hover .chat-del{opacity:1;}
.chat-del:hover{color:#e07070;}

.empty-sidebar{padding:14px 8px;font-size:11px;color:var(--text4);line-height:1.7;text-align:center;}

/* Sidebar footer */
.sidebar-footer{flex-shrink:0;padding:8px 10px;border-top:1px solid var(--border);}
.nav-row{
  display:flex;align-items:center;gap:9px;padding:8px 10px;
  font-size:12px;color:var(--text2);cursor:pointer;transition:all 0.1s;
  border:1px solid transparent;margin-bottom:1px;text-decoration:none;
}
.nav-row:hover{background:var(--bg3);color:var(--text);border-color:var(--border);}
.nav-icon{font-size:12px;opacity:0.5;flex-shrink:0;font-family:var(--mono);}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

/* ── TOPBAR ── */
.topbar{
  display:flex;align-items:center;gap:8px;
  padding:10px 16px;border-bottom:1px solid var(--border);
  background:rgba(10,10,10,0.92);backdrop-filter:blur(24px);
  flex-shrink:0;z-index:10;
}
.menu-btn{
  display:none;align-items:center;justify-content:center;width:30px;height:30px;
  background:transparent;border:1px solid var(--border);color:var(--text2);
  cursor:pointer;font-size:16px;flex-shrink:0;transition:all 0.1s;
}
.menu-btn:hover{background:var(--bg3);color:var(--text);}
@media(max-width:768px){.menu-btn{display:flex;}}

.model-pill{
  display:flex;align-items:center;gap:7px;padding:6px 11px;
  background:var(--bg3);border:1px solid var(--border2);cursor:pointer;
  transition:all 0.14s;font-size:12px;font-weight:500;color:var(--text);
}
.model-pill:hover{background:var(--bg4);border-color:var(--border3);}
.model-dot{
  width:7px;height:7px;flex-shrink:0;
  background:var(--accent2);
  clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);
  animation:roto 4s linear infinite;
}
@keyframes roto{to{transform:rotate(360deg);}}
.model-pill-name{max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.model-size-badge{
  font-family:var(--mono);font-size:9px;color:var(--accent);
  background:var(--accentbg);border:1px solid var(--accentbd);
  padding:1px 5px;letter-spacing:0.3px;
}
.model-caret{font-size:9px;color:var(--text4);margin-left:2px;}
.topbar-gap{flex:1;}
.tb-btn{
  width:30px;height:30px;background:transparent;
  border:1px solid var(--border);color:var(--text2);
  cursor:pointer;font-size:14px;transition:all 0.1s;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.tb-btn:hover{background:var(--bg3);color:var(--text);border-color:var(--border2);}
.model-loading-pill{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3);font-family:var(--mono);}

/* ── CHAT AREA ── */
.chat-area{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;}
.chat-scroll{max-width:760px;width:100%;margin:0 auto;padding:24px 16px 8px;display:flex;flex-direction:column;gap:0;min-height:100%;}

/* ── WELCOME ── */
.welcome{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:40px 20px;gap:20px;
  animation:wIn 0.5s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes wIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.welcome-icon-wrap{position:relative;margin-bottom:4px;}
.welcome-logo{
  width:72px;height:72px;
  background:var(--bg3);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:20px;font-weight:500;color:var(--accent);
  position:relative;
  clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));
  box-shadow:0 0 40px rgba(155,125,255,0.12);
  animation:logoPop 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.1s both;
  transition:box-shadow 0.3s;cursor:default;
}
.welcome-logo:hover{box-shadow:0 0 60px rgba(155,125,255,0.22);}
@keyframes logoPop{from{opacity:0;transform:scale(0.5);}to{opacity:1;transform:scale(1);}}
.welcome-glow{
  position:absolute;width:140px;height:140px;
  background:radial-gradient(circle,rgba(155,125,255,0.18) 0%,transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;animation:glowPulse 3s ease-in-out infinite;
}
@keyframes glowPulse{0%,100%{opacity:0.6;transform:translate(-50%,-50%) scale(1);}50%{opacity:1;transform:translate(-50%,-50%) scale(1.15);}}
.welcome h1{font-size:26px;font-weight:700;letter-spacing:-0.7px;color:var(--text);animation:wIn 0.5s 0.1s both;}
.welcome-sub{font-size:13px;color:var(--text2);line-height:1.75;max-width:340px;animation:wIn 0.5s 0.15s both;}
.no-model-badge{
  padding:10px 16px;background:var(--bg3);border:1px solid var(--border2);
  font-size:12px;color:var(--text2);line-height:1.5;max-width:320px;
}
.no-model-badge strong{color:var(--accent);}

/* Suggestion grid */
.suggestions{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:480px;animation:wIn 0.5s 0.2s both;}
@media(max-width:440px){.suggestions{grid-template-columns:1fr;}}
.suggestion{
  padding:11px 14px;background:var(--bg3);border:1px solid var(--border);
  text-align:left;cursor:pointer;transition:all 0.14s;
  position:relative;overflow:hidden;
}
.suggestion::before{content:'';position:absolute;inset:0;background:var(--accent);opacity:0;transition:opacity 0.14s;}
.suggestion:hover::before{opacity:0.04;}
.suggestion:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,0.3);}
.s-label{font-size:12px;font-weight:600;color:var(--text);position:relative;}
.s-sub{font-size:10px;color:var(--text3);margin-top:3px;font-family:var(--mono);letter-spacing:0.3px;position:relative;}

/* ── MESSAGES ── */
.messages-list{display:flex;flex-direction:column;gap:0;width:100%;}

.msg-group{
  display:flex;gap:14px;padding:16px 0;
  border-bottom:1px solid var(--border);
  animation:mIn 0.28s cubic-bezier(0.16,1,0.3,1) both;
}
.msg-group:last-of-type{border-bottom:none;}
@keyframes mIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.msg-group.user{background:transparent;}
.msg-group.ai{background:transparent;}

.avatar{
  width:28px;height:28px;flex-shrink:0;margin-top:1px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:8px;font-weight:500;
}
.avatar.ai{
  background:var(--accent);color:#fff;
  clip-path:polygon(0 0,calc(100% - 5px) 0,100% 5px,100% 100%,5px 100%,0 calc(100% - 5px));
  box-shadow:0 0 16px rgba(155,125,255,0.3);
}
.avatar.user{
  background:var(--bg4);border:1px solid var(--border2);color:var(--text2);
}

.msg-inner{flex:1;min-width:0;}
.msg-sender{font-size:11px;color:var(--text3);margin-bottom:6px;font-weight:600;letter-spacing:0.3px;display:flex;align-items:center;gap:8px;}

.bubble{
  font-size:13.5px;line-height:1.78;word-break:break-word;color:var(--text);
}
.msg-group.user .bubble{color:var(--text);}
.bubble-img{
  max-width:200px;max-height:140px;margin-bottom:8px;
  display:block;border:1px solid var(--border2);object-fit:cover;
}

.conf-tag{
  display:inline-flex;align-items:center;gap:5px;font-size:9px;color:var(--text3);
  font-family:var(--mono);margin-top:8px;padding:3px 7px;background:var(--bg3);
  border:1px solid var(--border);letter-spacing:0.3px;
}
.conf-dot{width:5px;height:5px;flex-shrink:0;clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);}

/* Typing */
.typing{
  display:inline-flex;align-items:center;gap:5px;padding:8px 0;
}
.typing-dot{width:5px;height:5px;background:var(--text3);animation:blink 1.2s ease-in-out infinite;}
.typing-dot:nth-child(2){animation-delay:0.18s}.typing-dot:nth-child(3){animation-delay:0.36s}
@keyframes blink{0%,100%{opacity:0.15;transform:scale(0.7);}50%{opacity:1;transform:scale(1.2);}}

/* ── INPUT AREA ── */
.input-wrap{
  flex-shrink:0;
  padding:0;
  border-top:1px solid var(--border);
  background:var(--bg2);
}
.input-container{
  max-width:760px;margin:0 auto;padding:12px 16px 16px;
}
.pending-img-bar{
  display:flex;align-items:center;gap:10px;
  padding:8px 12px;background:var(--bg3);
  border:1px solid var(--border2);border-bottom:none;
  margin-bottom:0;
}
.pending-img-thumb{width:36px;height:36px;object-fit:cover;border:1px solid var(--border2);}
.pending-img-label{font-size:11px;color:var(--text2);flex:1;line-height:1.4;}
.pending-img-remove{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:18px;line-height:1;padding:2px 4px;transition:color 0.1s;}
.pending-img-remove:hover{color:var(--text);}

.input-inner{
  display:flex;align-items:flex-end;gap:8px;
  background:var(--bg3);border:1px solid var(--border2);
  padding:10px 10px 10px 14px;
  transition:border-color 0.15s,box-shadow 0.15s;
}
.input-inner:focus-within{
  border-color:rgba(155,125,255,0.4);
  box-shadow:0 0 0 3px rgba(155,125,255,0.06);
}
.input-inner textarea{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--text);font-family:var(--font);font-size:13.5px;
  line-height:1.6;resize:none;min-height:22px;max-height:160px;
  overflow-y:auto;scrollbar-width:none;
}
.input-inner textarea::-webkit-scrollbar{display:none;}
.input-inner textarea::placeholder{color:var(--text4);}

.input-actions{display:flex;align-items:flex-end;gap:6px;flex-shrink:0;}
.img-btn{
  width:30px;height:30px;flex-shrink:0;background:transparent;
  border:1px solid var(--border);color:var(--text3);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:13px;
  transition:all 0.12s;
}
.img-btn:hover{background:var(--bg4);color:var(--text);border-color:var(--border2);}
.img-btn:disabled{opacity:0.25;cursor:not-allowed;}
.send-btn{
  width:30px;height:30px;flex-shrink:0;
  background:var(--accent);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;
  transition:all 0.14s;
  box-shadow:0 2px 12px rgba(155,125,255,0.3);
  clip-path:polygon(0 0,calc(100% - 5px) 0,100% 5px,100% 100%,5px 100%,0 calc(100% - 5px));
}
.send-btn:hover:not(:disabled){background:var(--accent-h);box-shadow:0 4px 20px rgba(155,125,255,0.5);}
.send-btn:disabled{opacity:0.25;cursor:not-allowed;box-shadow:none;}

.input-hint{
  font-size:10px;color:var(--text4);text-align:center;padding-top:8px;line-height:1.4;
  font-family:var(--mono);
}
.input-hint span{color:var(--accent);cursor:pointer;transition:opacity 0.1s;}
.input-hint span:hover{opacity:0.7;}

/* ── SPINNER ── */
.load-spin{
  width:12px;height:12px;border:2px solid var(--border);
  border-top-color:var(--accent);animation:spin 0.6s linear infinite;flex-shrink:0;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── MODALS ── */
.overlay{
  position:fixed;inset:0;z-index:60;
  background:rgba(0,0,0,0.75);backdrop-filter:blur(5px);
  display:flex;align-items:center;justify-content:center;padding:16px;
  animation:ovIn 0.16s ease;
}
@keyframes ovIn{from{opacity:0;}to{opacity:1;}}
.modal{
  background:var(--bg2);border:1px solid var(--border2);
  width:100%;max-width:460px;max-height:88vh;overflow:hidden;
  display:flex;flex-direction:column;
  animation:moPop 0.22s cubic-bezier(0.16,1,0.3,1);
  box-shadow:0 24px 80px rgba(0,0,0,0.6);
}
@keyframes moPop{from{opacity:0;transform:scale(0.95) translateY(10px);}to{opacity:1;transform:scale(1) translateY(0);}}
.modal-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 18px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.modal-title{font-size:14px;font-weight:700;letter-spacing:-0.3px;}
.modal-sub{font-size:10px;color:var(--text3);margin-top:2px;font-family:var(--mono);}
.close-btn{
  width:28px;height:28px;background:transparent;border:1px solid var(--border);
  color:var(--text3);cursor:pointer;font-size:17px;transition:all 0.12s;
  display:flex;align-items:center;justify-content:center;
}
.close-btn:hover{background:var(--bg3);color:var(--text);}
.modal-body{padding:16px 18px;overflow-y:auto;flex:1;}
.modal-sec{font-size:9px;font-weight:700;color:var(--text4);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}

/* Model items */
.model-item{
  display:flex;align-items:flex-start;gap:12px;padding:11px 13px;
  border:1px solid var(--border);background:var(--bg3);cursor:pointer;
  transition:all 0.14s;margin-bottom:5px;
}
.model-item:hover{background:var(--bg4);border-color:var(--border2);transform:translateY(-1px);}
.model-item.selected{border-color:var(--accentbd);background:var(--accentbg);}
.model-icon{font-size:14px;flex-shrink:0;margin-top:2px;color:var(--accent);font-family:var(--mono);}
.model-info{flex:1;min-width:0;}
.model-name{font-size:12px;font-weight:600;color:var(--text);}
.model-desc{font-size:11px;color:var(--text2);margin-top:2px;line-height:1.4;}
.model-meta-row{display:flex;align-items:center;gap:5px;margin-top:5px;flex-wrap:wrap;}
.model-size{font-family:var(--mono);font-size:9px;color:var(--accent);background:var(--accentbg);border:1px solid var(--accentbd);padding:1px 5px;}
.model-tags{display:flex;gap:3px;flex-wrap:wrap;}
.tag{font-size:9px;font-family:var(--mono);padding:1px 5px;background:var(--bg4);border:1px solid var(--border);color:var(--text2);}
.tag.accent{background:var(--accentbg);border-color:var(--accentbd);color:var(--accent);}
.model-check{flex-shrink:0;font-size:13px;color:var(--accent);font-family:var(--mono);}
.no-models{padding:24px 16px;text-align:center;font-size:12px;color:var(--text3);border:1px dashed var(--border);line-height:1.9;}
.no-models code{font-family:var(--mono);color:var(--text2);}

/* Settings */
.settings-section{margin-bottom:18px;}
.settings-section:last-child{margin-bottom:0;}
.settings-label{font-size:9px;font-weight:700;color:var(--text4);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;font-family:var(--mono);}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;background:var(--bg3);border:1px solid var(--border);margin-bottom:5px;}

<body>
<div id="root"></div>

<script>
/* ════════════════════════════════════════════════
   ZYWAYLE ENGINE — Enhanced AI Inference
   BM25 Retrieval + Intent Detection + Neural Net
   ════════════════════════════════════════════════ */

window.ZYY = {
  randn(s=0.1){let u=0,v=0;while(!u)u=Math.random();while(!v)v=Math.random();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v)*s;},
  zeros(r,c){return Array.from({length:r},()=>new Float32Array(c));},
  dot(a,b){const o=new Float32Array(b[0].length);for(let j=0;j<b[0].length;j++)for(let k=0;k<a.length;k++)o[j]+=a[k]*b[k][j];return o;},
  relu(x){return Math.max(0,x);},leaky(x){return x>0?x:0.01*x;},
  sigmoid(x){return 1/(1+Math.exp(-x));},
  softmax(v){const m=Math.max(...v),e=v.map(x=>Math.exp(x-m)),s=e.reduce((a,b)=>a+b,0);return e.map(x=>x/s);},
  tokenize(t){return t.toLowerCase().replace(/[^a-z0-9\s]/g,' ').split(/\s+/).filter(Boolean);},
  buildVocab(pairs){const v={};let i=0;for(const[q]of pairs)for(const t of ZYY.tokenize(q))if(!(t in v))v[t]=i++;return v;},
  textToVec(text,vocab,size){
    const vec=new Float32Array(size);
    const toks=ZYY.tokenize(text);
    for(const t of toks){if(t in vocab)vec[vocab[t]%size]+=1;}
    for(let i=0;i<toks.length-1;i++){
      const bi=toks[i]+' '+toks[i+1];
      let h=0;for(let k=0;k<bi.length;k++)h=(h*31+bi.charCodeAt(k))>>>0;
      vec[h%size]+=0.5;
    }
    const mag=Math.sqrt(vec.reduce((s,v)=>s+v*v,0));
    if(mag>0)for(let i=0;i<vec.length;i++)vec[i]/=mag;
    return vec;
  },
  countParams(layers){return layers.reduce((s,l)=>s+l.W.length*l.W[0].length+l.b.length,0);},
  charNgrams(s,n=3){const res=new Set();const p=' '+s+' ';for(let i=0;i<=p.length-n;i++)res.add(p.slice(i,i+n));return res;},
  ngramSim(a,b,n=3){const sa=ZYY.charNgrams(a.toLowerCase(),n),sb=ZYY.charNgrams(b.toLowerCase(),n);let inter=0;for(const x of sa)if(sb.has(x))inter++;return inter/Math.max(sa.size,sb.size,1);},
};

class BM25Retriever {
  constructor(pairs,k1=1.5,b=0.75){
    this.pairs=pairs;this.k1=k1;this.b=b;this.N=pairs.length;
    this.docs=pairs.map(([q])=>ZYY.tokenize(q));
    this.avgdl=this.docs.reduce((s,d)=>s+d.length,0)/(this.N||1);
    this.df={};
    for(const doc of this.docs)for(const t of new Set(doc))this.df[t]=(this.df[t]||0)+1;
  }
  score(query,dIdx){
    const doc=this.docs[dIdx],dl=doc.length;
    const tf={};for(const t of doc)tf[t]=(tf[t]||0)+1;
    const qt=new Set(ZYY.tokenize(query));
    let score=0;
    for(const t of qt){
      const df=this.df[t]||0;if(!df)continue;
      const idf=Math.log((this.N-df+0.5)/(df+0.5)+1);
      const tfn=(tf[t]||0)*(this.k1+1)/((tf[t]||0)+this.k1*(1-this.b+this.b*dl/this.avgdl));
      score+=idf*tfn;
    }
    return score;
  }
  query(text,k=3){
    const scores=this.docs.map((_,i)=>({i,score:this.score(text,i)}));
    scores.sort((a,b)=>b.score-a.score);
    const max=scores[0]?.score||1;
    return scores.slice(0,k).filter(s=>s.score>0).map(s=>({pair:this.pairs[s.i],score:s.score/max}));
  }
}

class NeuralNet {
  constructor(sizes,act='relu'){
    this.sizes=sizes;this.act=act;this.layers=[];this.t=0;
    for(let i=0;i<sizes.length-1;i++){
      const fin=sizes[i],fout=sizes[i+1],s=Math.sqrt(2/fin);
      const W=Array.from({length:fin},()=>Array.from({length:fout},()=>ZYY.randn(s)));
      const b=new Float32Array(fout);
      this.layers.push({W,b,mW:ZYY.zeros(fin,fout),mb:new Float32Array(fout),vW:ZYY.zeros(fin,fout),vb:new Float32Array(fout)});
    }
  }
  activate(x){
    if(this.act==='tanh')return Math.tanh(x);
    if(this.act==='sigmoid')return ZYY.sigmoid(x);
    if(this.act==='leaky')return ZYY.leaky(x);
    return ZYY.relu(x);
  }
  forward(input){
    let a=Float32Array.from(input);
    for(let i=0;i<this.layers.length;i++){
      const{W,b}=this.layers[i];const z=ZYY.dot(a,W);
      for(let j=0;j<z.length;j++)z[j]+=b[j];
      const isLast=i===this.layers.length-1;
      a=isLast?z:Float32Array.from(z.map(v=>this.activate(v)));
    }return a;
  }
  predict(input){return this.forward(input);}
  static deserialize(d){
    const net=new NeuralNet(d.sizes,d.act);net.t=d.t||0;
    net.layers=d.layers.map((ld,i)=>{const l=net.layers[i];l.W=ld.W.map(r=>[...r]);l.b=Float32Array.from(ld.b);return l;});
    return net;
  }
  serialize(){return{sizes:this.sizes,act:this.act,t:this.t,layers:this.layers.map(l=>({W:l.W.map(r=>[...r]),b:[...l.b]}))};}
}
window.NeuralNet=NeuralNet;

const INTENTS=[
  {re:/^(hi+|hello+|hey+|howdy|sup|yo|greetings)/,fn:()=>['Hello! How can I help you today?','Hey there! What can I do for you?','Hi! Ask me anything.'][Math.floor(Math.random()*3)]},
  {re:/^(good (morning|afternoon|evening|night))/,fn:()=>['Good day! How can I assist?','Hello! Hope you\'re having a great day.'][Math.floor(Math.random()*2)]},
  {re:/^(thanks?|thank you|thx|ty|cheers|appreciate)/,fn:()=>['You\'re welcome!','Happy to help!','Anytime!'][Math.floor(Math.random()*3)]},
  {re:/^(bye|goodbye|see (you|ya)|cya|ttyl|later|farewell)/,fn:()=>['Goodbye! Come back anytime.','See you later!','Take care!'][Math.floor(Math.random()*3)]},
  {re:/(who are you|what are you|your name|introduce yourself)/,fn:()=>'I\'m Zywayle, a custom-trained AI assistant running entirely in your browser. I use a neural network trained on custom data — no data leaves your device.'},
  {re:/(how are you|how('re| are) you doing|you okay|you good)/,fn:()=>['Doing great, thanks for asking! How about you?','Running smoothly! What can I help with?'][Math.floor(Math.random()*2)]},
  {re:/^(what can you (do|help)|help me|what do you know)/,fn:()=>'I can answer questions based on my training data. The more I\'ve been trained, the better I get! Try asking me anything.'},
  {re:/^(ok+|okay|alright|sure|got it|i see|understood|makes sense)/,fn:()=>['Got it! Anything else?','Sure thing! What else can I help with?','Understood. Let me know if you need anything.'][Math.floor(Math.random()*3)]},
  {re:/^(yes|yeah|yep|yup|correct|exactly|right|absolutely)/,fn:()=>['Great!','Awesome!','Perfect!'][Math.floor(Math.random()*3)]+' What else can I help you with?'},
  {re:/^(no|nope|nah|not really)/,fn:()=>['No problem! Feel free to ask anything else.','Alright, let me know if there\'s anything I can do for you.'][Math.floor(Math.random()*2)]},
  {re:/^(lol|lmao|haha|hehe|😂|😄)/,fn:()=>['Ha! 😄','Glad that amused you!','😄 Anything else I can help with?'][Math.floor(Math.random()*3)]},
];

function inferResponse(input, history, model) {
  if(!model) return {text:"No model loaded. Open the model picker above and select a model to start chatting.",conf:0,method:'none'};
  const lower=input.toLowerCase().trim();
  for(const intent of INTENTS){if(intent.re.test(lower)){return {text:intent.fn(),conf:0.95,method:'intent'};}}
  if(model.qaMap&&model.qaMap[lower])return {text:model.qaMap[lower],conf:1.0,method:'exact'};
  if(model.bm25){
    const hits=model.bm25.query(lower,3);
    if(hits.length&&hits[0].score>0.35)return {text:hits[0].pair[1],conf:hits[0].score,method:'retrieval'};
    if(history&&history.length>0){
      const lastMsgs=history.slice(-4).map(m=>m.text).join(' ');
      const ctxHits=model.bm25.query(lastMsgs+' '+input,2);
      if(ctxHits.length&&ctxHits[0].score>0.28)return {text:ctxHits[0].pair[1],conf:ctxHits[0].score*0.88,method:'contextual'};
      if(hits.length&&hits[0].score>0.15)return {text:hits[0].pair[1],conf:hits[0].score,method:'retrieval'};
    }
  }
  if(model.net&&model.vocab&&model.pairs&&model.pairs.length){
    const inputSize=model.meta?.sizes?.[0]||128;
    const inp=ZYY.textToVec(lower,model.vocab,inputSize);
    const raw=model.net.predict(inp);
    const sm=ZYY.softmax(raw);
    const maxP=Math.max(...sm);
    if(maxP>0.18){const idx=sm.indexOf(maxP)%model.pairs.length;return {text:model.pairs[idx][1],conf:maxP,method:'neural'};}
  }
  if(model.pairs){
    let best=null,bestScore=0;
    for(const[q,a]of model.pairs){const s=ZYY.ngramSim(lower,q.toLowerCase(),3);if(s>bestScore){bestScore=s;best=a;}}
    if(bestScore>0.45)return {text:best,conf:bestScore,method:'fuzzy'};
  }
  const toks=lower.split(/\s+/).filter(t=>t.length>2);
  if(toks.length&&model.pairs){
    let best=null,bestScore=0;
    for(const[q,a]of model.pairs){const qt=q.toLowerCase().split(/\s+/);const s=toks.filter(t=>qt.some(qw=>qw===t||qw.includes(t)||t.includes(qw))).length/toks.length;if(s>bestScore){bestScore=s;best=a;}}
    if(bestScore>0.5)return {text:best,conf:bestScore,method:'token'};
  }
  const fallbacks=["I don't have a good answer for that based on my training. Could you rephrase?","That's outside my current training data. Try asking something else!","Hmm, I'm not sure about that one. Could you be more specific?","I don't quite understand — could you rephrase your question?","That's a good question, but I haven't been trained on it yet. Try something else!"];
  return {text:fallbacks[Math.floor(Math.random()*fallbacks.length)],conf:0,method:'fallback'};
}

async function fetchModels(){
  const models=[];
  try{
    const r=await fetch('./Models/meta.txt');
    if(!r.ok)throw new Error();
    const text=await r.text();
    for(const line of text.split('\n').map(l=>l.trim()).filter(l=>l&&!l.startsWith('#'))){
      const parts=line.split('|').map(p=>p.trim());
      if(parts.length>=2){
        const[file,name,size='',desc='',tagsStr='']=parts;
        const tags=tagsStr.split(',').map(t=>t.trim()).filter(Boolean);
        models.push({id:'m_'+file.replace(/\.[^.]+$/,''),name,size,file:'./Models/'+file,desc:desc||'Custom trained Zywayle model',tags,type:'file'});
      }
    }
  }catch{}
  return models;
}

async function loadModelFile(url){
  const r=await fetch(url);
  if(!r.ok)throw new Error('Failed: '+url);
  const data=await r.json();
  const net=NeuralNet.deserialize(data.net||data);
  const qaMap={};
  if(data.qaMap)Object.assign(qaMap,data.qaMap);
  if(data.pairs)for(const[q,a]of data.pairs)qaMap[q.toLowerCase()]=a;
  const allPairs=data.pairs||[];
  const bm25=allPairs.length?new BM25Retriever(allPairs):null;
  return{net,vocab:data.vocab||{},qaMap,pairs:allPairs,bm25,meta:data.meta||{sizes:net.sizes},params:ZYY.countParams(net.layers)};
}
</script>

<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;
const DB={
  get:(k,d=null)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
};
const uid=()=>Math.random().toString(36).slice(2,9);
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

/* ─── IMAGE OCR MODAL ─── */
function ImageModal({onUse,onClose}){
  const [phase,setPhase]=useState('pick');
  const [progress,setProgress]=useState(0);
  const [ocrText,setOcrText]=useState('');
  const [previewUrl,setPreviewUrl]=useState(null);
  const fileRef=useRef(null);
  const camRef=useRef(null);

  const processFile=async(file)=>{
    if(!file)return;
    setPreviewUrl(URL.createObjectURL(file));
    setPhase('ocr');setProgress(5);
    try{
      const worker=await Tesseract.createWorker('eng',1,{
        logger:m=>{if(m.status==='recognizing text')setProgress(Math.round(m.progress*90)+5);}
      });
      const{data:{text}}=await worker.recognize(file);
      await worker.terminate();
      setProgress(100);
      setOcrText(text.trim());
      setPhase(text.trim()?'done':'empty');
    }catch(e){console.error(e);setPhase('error');}
  };

  return(
    <div className="overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:400}} onClick={e=>e.stopPropagation()}>
        <div className="modal-head">
          <div><div className="modal-title">Image to Text</div><div className="modal-sub">Extract text from an image and send it</div></div>
          <button className="close-btn" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          {phase==='pick'&&(
            <div className="ocr-options">
              <div className="ocr-option-btn" onClick={()=>camRef.current?.click()}>
                <span className="ocr-option-icon">📷</span><span>Take Photo</span>
                <input ref={camRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={e=>processFile(e.target.files[0])}/>
              </div>
              <div className="ocr-option-btn" onClick={()=>fileRef.current?.click()}>
                <span className="ocr-option-icon">🖼️</span><span>Upload Image</span>
                <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={e=>processFile(e.target.files[0])}/>
              </div>
            </div>
          )}
          {phase==='ocr'&&(
            <div className="ocr-progress">
              <div className="load-spin" style={{width:20,height:20,borderWidth:3}}/>
              <div className="ocr-progress-label">Reading text from image…</div>
              <div className="ocr-progress-bar-wrap" style={{width:'100%'}}><div className="ocr-progress-bar" style={{width:progress+'%'}}/></div>
              <div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)'}}>{progress}%</div>
            </div>
          )}
          {(phase==='done'||phase==='empty')&&(
            <div className="ocr-result-wrap">
              {previewUrl&&<img src={previewUrl} className="ocr-preview-img" alt="OCR source"/>}
              <div style={{fontSize:10,color:'var(--text3)',marginBottom:4,fontWeight:600,letterSpacing:'1.5px',textTransform:'uppercase',fontFamily:'var(--mono)'}}>Extracted Text</div>
              {phase==='empty'?<div className="ocr-extracted"><span className="ocr-empty">No text detected. Try a clearer image.</span></div>:<div className="ocr-extracted">{ocrText}</div>}
              <div className="ocr-actions">
                <button className="ocr-btn" onClick={()=>setPhase('pick')}>↩ Try again</button>
                {phase==='done'&&<button className="ocr-btn primary" onClick={()=>{onUse(ocrText);onClose();}}>Send as message →</button>}
              </div>
            </div>
          )}
          {phase==='error'&&(
            <div style={{textAlign:'center',padding:'24px 0',color:'var(--text2)',fontSize:13}}>
              <div style={{fontSize:28,marginBottom:10}}>⚠️</div>
              <div>Could not read the image. Try a different file.</div>
              <button className="ocr-btn" style={{marginTop:12,display:'inline-block',width:'auto'}} onClick={()=>setPhase('pick')}>Try again</button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ─── MAIN APP ─── */
function App(){
  const [chats,setChats]=useState(()=>DB.get('zyy_chats',[]));
  const [activeId,setActiveId]=useState(null);
  const [input,setInput]=useState('');
  const [typing,setTyping]=useState(false);
  const [sidebarOpen,setSidebarOpen]=useState(false);
  const [showPicker,setShowPicker]=useState(false);
  const [showPlans,setShowPlans]=useState(false);
  const [showSettings,setShowSettings]=useState(false);
  const [showImageModal,setShowImageModal]=useState(false);
  const [models,setModels]=useState([]);
  const [modelsLoading,setModelsLoading]=useState(true);
  const [selModelId,setSelModelId]=useState(()=>DB.get('zy_sel',null));
  const [loadedModel,setLoadedModel]=useState(null);
  const [modelLoading,setModelLoading]=useState(false);
  const [resetConfirm,setResetConfirm]=useState(false);
  const [pendingImg,setPendingImg]=useState(null);
  const chatAreaRef=useRef(null);
  const bottomRef=useRef(null);
  const taRef=useRef(null);

  const activeChat=useMemo(()=>chats.find(c=>c.id===activeId)||null,[chats,activeId]);

  useEffect(()=>{
    setModelsLoading(true);
    fetchModels().then(ms=>{
      setModels(ms);setModelsLoading(false);
      setSelModelId(p=>{if(!p&&ms.length>0)return ms[0].id;return p;});
    }).catch(()=>setModelsLoading(false));
  },[]);

  useEffect(()=>{
    if(!selModelId){setLoadedModel(null);return;}
    const info=models.find(m=>m.id===selModelId);
    if(!info)return;
    setModelLoading(true);
    loadModelFile(info.file).then(m=>{setLoadedModel(m);setModelLoading(false);}).catch(()=>{setLoadedModel(null);setModelLoading(false);});
  },[selModelId,models]);

  useEffect(()=>{DB.set('zyy_chats',chats);},[chats]);
  useEffect(()=>{DB.set('zy_sel',selModelId);},[selModelId]);

  useEffect(()=>{
    if(bottomRef.current)bottomRef.current.scrollIntoView({behavior:'smooth',block:'end'});
  },[activeChat?.messages?.length,typing]);

  const newChat=useCallback(()=>{
    const id=uid();
    setChats(p=>[{id,title:'New chat',messages:[],createdAt:Date.now()},...p]);
    setActiveId(id);setSidebarOpen(false);
  },[]);

  const delChat=useCallback((id,e)=>{
    e.stopPropagation();
    setChats(p=>p.filter(c=>c.id!==id));
    if(activeId===id)setActiveId(null);
  },[activeId]);

  const resetAll=useCallback(()=>{
    localStorage.removeItem('zyy_chats');localStorage.removeItem('zy_sel');
    setChats([]);setActiveId(null);setSelModelId(null);setLoadedModel(null);
    setResetConfirm(false);setShowSettings(false);
  },[]);

  const send=useCallback(async(textOverride=null)=>{
    const text=(textOverride||input).trim();
    if(!text||typing)return;
    setInput('');
    if(taRef.current)taRef.current.style.height='auto';

    let cid=activeId;let currentChats=null;
    if(!cid){
      const id=uid();
      const newChatObj={id,title:text.slice(0,42),messages:[],createdAt:Date.now()};
      setChats(p=>{currentChats=[newChatObj,...p];return currentChats;});
      setActiveId(id);cid=id;
    }

    const userMsg={id:uid(),role:'user',text,imgUrl:pendingImg?.url||null,ts:Date.now()};
    setPendingImg(null);
    setChats(p=>p.map(c=>c.id===cid?{...c,title:c.messages.length===0?text.slice(0,42):c.title,messages:[...c.messages,userMsg]}:c));
    setTyping(true);
    await sleep(180+Math.random()*280);

    const snapshot=currentChats||chats;
    const hist=snapshot.find(c=>c.id===cid)?.messages||[];
    const result=inferResponse(text,hist,loadedModel);
    const aiMsg={id:uid(),role:'ai',text:result.text,conf:result.conf,method:result.method,ts:Date.now()};
    setChats(p=>p.map(c=>c.id===cid?{...c,messages:[...c.messages,aiMsg]}:c));
    setTyping(false);
  },[input,typing,activeId,loadedModel,chats,pendingImg]);

  const onKey=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}};
  const resizeTA=e=>{
    const ta=e.target;
    requestAnimationFrame(()=>{ta.style.height='auto';ta.style.height=Math.min(ta.scrollHeight,160)+'px';});
  };

  const curModel=models.find(m=>m.id===selModelId)||null;
  const hasModel=!!(loadedModel&&curModel);
  const today=chats.filter(c=>Date.now()-c.createdAt<86400000);
  const older=chats.filter(c=>Date.now()-c.createdAt>=86400000);

  const suggestions=[
    {label:'What is machine learning?',sub:'ai/ml'},
    {label:'Explain neural networks',sub:'deep learning'},
    {label:'What can you help with?',sub:'getting started'},
    {label:'How do you work?',sub:'about zywayle'},
  ];

  const methodColor={
    'exact':'var(--accent2)','retrieval':'var(--accent)',
    'bm25':'var(--accent)','neural':'var(--accent3)',
    'contextual':'#60a5fa','intent':'var(--accent2)',
    'fuzzy':'#f472b6','token':'#fb923c','fallback':'var(--text3)'
  };

  return(
    <div className="app">
      <div className={`sidebar-overlay ${sidebarOpen?'open':''}`} onClick={()=>setSidebarOpen(false)}/>

      {/* ── SIDEBAR ── */}
      <div className={`sidebar ${sidebarOpen?'open':''}`}>
        <div className="sidebar-header">
          <div className="logo-mark">ZY</div>
          <div>
            <div className="logo-text">Zywayle</div>
            <div className="logo-sub">NEURAL AI</div>
          </div>
        </div>

        <div className="sidebar-body">
          <button className="new-btn" onClick={newChat}>
            <span className="new-btn-icon">+</span> New conversation
          </button>

          {today.length>0&&<>
            <div className="sec-label">Today</div>
            {today.map(c=>(
              <div key={c.id} className={`chat-row ${c.id===activeId?'active':''}`} onClick={()=>{setActiveId(c.id);setSidebarOpen(false);}}>
                <div className="chat-row-dot"/>
                <span className="chat-row-text">{c.title||'Untitled'}</span>
                <button className="chat-del" onClick={e=>delChat(c.id,e)}>×</button>
              </div>
            ))}
          </>}

          {older.length>0&&<>
            <div className="sec-label">Previous</div>
            {older.map(c=>(
              <div key={c.id} className={`chat-row ${c.id===activeId?'active':''}`} onClick={()=>{setActiveId(c.id);setSidebarOpen(false);}}>
                <div className="chat-row-dot"/>
                <span className="chat-row-text">{c.title||'Untitled'}</span>
                <button className="chat-del" onClick={e=>delChat(c.id,e)}>×</button>
              </div>
            ))}
          </>}

          {chats.length===0&&<div className="empty-sidebar">No conversations yet.<br/>Start by clicking New conversation.</div>}
        </div>

        <div className="sidebar-footer">
          <div className="nav-row" onClick={()=>{setShowPlans(true);setSidebarOpen(false);}}>
            <span className="nav-icon">◇</span> Plans &amp; Pricing
          </div>
          <a className="nav-row" href="training.html" style={{color:'inherit'}}>
            <span className="nav-icon">⚙</span> Trainer
          </a>
          <div className="nav-row" onClick={()=>{setShowSettings(true);setSidebarOpen(false);}}>
            <span className="nav-icon">≡</span> Settings
          </div>
        </div>
      </div>

      {/* ── MAIN ── */}
      <div className="main">

        {/* TOPBAR */}
        <div className="topbar">
          <button className="menu-btn" onClick={()=>setSidebarOpen(o=>!o)}>≡</button>

          <div className="model-pill" onClick={()=>setShowPicker(true)}>
            <div className="model-dot"/>
            <span className="model-pill-name">
              {modelLoading?'Loading…':curModel?curModel.name:modelsLoading?'Loading…':'No model'}
            </span>
            {curModel?.size&&!modelLoading&&<span className="model-size-badge">{curModel.size}</span>}
            <span className="model-caret">▾</span>
          </div>

          {modelLoading&&<div className="model-loading-pill"><div className="load-spin"/>Loading…</div>}

          <div className="topbar-gap"/>

          <button className="tb-btn" onClick={newChat} title="New chat">+</button>
          <button className="tb-btn" onClick={()=>setShowSettings(true)} title="Settings">⚙</button>
        </div>

        {/* CHAT AREA */}
        <div className="chat-area" ref={chatAreaRef}>
          <div className="chat-scroll">
            {!activeChat?(
              <div className="welcome">
                <div className="welcome-icon-wrap">
                  <div className="welcome-glow"/>
                  <div className="welcome-logo">ZY</div>
                </div>
                <h1>Zywayle AI</h1>
                <p className="welcome-sub">A real neural network running entirely in your browser. Completely private — nothing leaves your device.</p>
                {!hasModel&&!modelLoading&&!modelsLoading&&(
                  <div className="no-model-badge"><strong>No model loaded.</strong> Click the model selector above to choose one.</div>
                )}
                {hasModel&&(
                  <div className="suggestions">
                    {suggestions.map(s=>(
                      <div key={s.label} className="suggestion" onClick={()=>{setInput(s.label);taRef.current?.focus();}}>
                        <div className="s-label">{s.label}</div>
                        <div className="s-sub">{s.sub}</div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            ):(
              <div className="messages-list">
                {activeChat.messages.map(msg=>(
                  <div key={msg.id} className={`msg-group ${msg.role}`}>
                    <div className={`avatar ${msg.role}`}>
                      {msg.role==='ai'?'ZY':'YOU'}
                    </div>
                    <div className="msg-inner">
                      <div className="msg-sender">
                        {msg.role==='ai'?(curModel?.name||'Zywayle'):'You'}
                      </div>
                      <div className="bubble">
                        {msg.imgUrl&&<img src={msg.imgUrl} className="bubble-img" alt="Sent image"/>}
                        {msg.text}
                      </div>
                      {msg.role==='ai'&&msg.conf>0&&(
                        <div className="conf-tag">
                          <div className="conf-dot" style={{background:methodColor[msg.method]||'var(--accent2)'}}/>
                          <span style={{color:methodColor[msg.method]||'var(--accent2)'}}>{msg.method}</span>
                          <span style={{color:'var(--text4)'}}>·</span>
                          {(msg.conf*100).toFixed(0)}%
                        </div>
                      )}
                    </div>
                  </div>
                ))}
                {typing&&(
                  <div className="msg-group ai">
                    <div className="avatar ai">ZY</div>
                    <div className="msg-inner">
                      <div className="msg-sender">{curModel?.name||'Zywayle'}</div>
                      <div className="typing">
                        <div className="typing-dot"/><div className="typing-dot"/><div className="typing-dot"/>
                      </div>
                    </div>
                  </div>
                )}
                <div ref={bottomRef} className="chat-bottom-anchor"/>
              </div>
            )}
          </div>
        </div>

        {/* INPUT */}
        <div className="input-wrap">
          <div className="input-container">
            {pendingImg&&(
              <div className="pending-img-bar">
                <img src={pendingImg.url} className="pending-img-thumb" alt="Pending"/>
                <span className="pending-img-label">Image attached — text extracted and ready to send</span>
                <button className="pending-img-remove" onClick={()=>setPendingImg(null)}>×</button>
              </div>
            )}
            <div className="input-inner">
              <textarea
                ref={taRef}
                value={input}
                onChange={e=>{setInput(e.target.value);resizeTA(e);}}
                onKeyDown={onKey}
                placeholder={hasModel?'Message Zywayle… (Enter to send)':'Load a model to start chatting…'}
                rows={1}
                disabled={typing||modelLoading||!hasModel}
              />
              <div className="input-actions">
                <button className="img-btn" onClick={()=>setShowImageModal(true)} title="Image to text (OCR)" disabled={typing}>
                  📷
                </button>
                <button className="send-btn" onClick={()=>send()} disabled={!input.trim()||typing||modelLoading||!hasModel}>
                  ↑
                </button>
              </div>
            </div>
            <div className="input-hint">
              Zywayle · Local neural AI · No data leaves your browser ·{' '}
              <span onClick={()=>setShowPicker(true)}>Switch model</span>
            </div>
          </div>
        </div>
      </div>

      {/* OCR MODAL */}
      {showImageModal&&(
        <ImageModal
          onUse={(text)=>{setInput(text);taRef.current?.focus();}}
          onClose={()=>setShowImageModal(false)}
        />
      )}

      {/* MODEL PICKER */}
      {showPicker&&(
        <div className="overlay" onClick={()=>setShowPicker(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-head">
              <div><div className="modal-title">Choose Model</div><div className="modal-sub">Loaded from /Models/meta.txt</div></div>
              <button className="close-btn" onClick={()=>setShowPicker(false)}>×</button>
            </div>
            <div className="modal-body">
              {modelsLoading&&<div style={{display:'flex',alignItems:'center',gap:8,padding:'14px 0',color:'var(--text3)',fontSize:12}}><div className="load-spin"/>Loading models…</div>}
              {!modelsLoading&&models.length>0&&(
                <><div className="modal-sec">Available Models</div>
                  {models.map(m=>(
                    <div key={m.id} className={`model-item ${selModelId===m.id?'selected':''}`} onClick={()=>{setSelModelId(m.id);setShowPicker(false);}}>
                      <div className="model-icon">&gt;</div>
                      <div className="model-info">
                        <div className="model-name">{m.name}</div>
                        <div className="model-desc">{m.desc}</div>
                        <div className="model-meta-row">
                          {m.size&&<span className="model-size">{m.size}</span>}
                          <div className="model-tags">{m.tags.map((t,i)=><span key={i} className="tag accent">{t}</span>)}</div>
                        </div>
                      </div>
                      {selModelId===m.id&&<div className="model-check">✓</div>}
                    </div>
                  ))}
                </>
              )}
              {!modelsLoading&&models.length===0&&(
                <div className="no-models">
                  No models found in <code>./Models/</code><br/>
                  Add a <code>meta.txt</code> and <code>*.zyy</code> files.<br/>
                  Format: <code>file.zyy | Name | Size | Desc | tags</code><br/><br/>
                  Use the <a href="training.html" style={{color:'var(--accent)'}}>Trainer</a> to create a model.
                </div>
              )}
            </div>
          </div>
        </div>
      )}

      {/* PLANS MODAL */}
      {showPlans&&(
        <div className="overlay" onClick={()=>setShowPlans(false)}>
          <div className="modal" style={{maxWidth:380}} onClick={e=>e.stopPropagation()}>
            <div className="modal-head">
              <div><div className="modal-title">Plans &amp; Pricing</div><div className="modal-sub">Zywayle</div></div>
              <button className="close-btn" onClick={()=>setShowPlans(false)}>×</button>
            </div>
            <div className="modal-body">
              <div className="plans-coming">
                <div className="plans-coming-icon">◈</div>
                <h3>Coming Soon</h3>
                <p>Plans are in development. Zywayle is completely free right now — enjoy unlimited access while we build premium features.</p>
                <div className="plans-badge">IN DEVELOPMENT</div>
                <div className="info-banner" style={{textAlign:'left',marginTop:4}}>
                  <span className="info-banner-icon">&gt;</span>
                  <span>A free tier will always be available. Premium tiers will unlock cloud models, advanced training, and collaboration.</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* SETTINGS MODAL */}
      {showSettings&&(
        <div className="overlay" onClick={()=>{setShowSettings(false);setResetConfirm(false);}}>
          <div className="modal" style={{maxWidth:420}} onClick={e=>e.stopPropagation()}>
            <div className="modal-head">
              <div><div className="modal-title">Settings</div><div className="modal-sub">Zywayle Neural AI</div></div>
              <button className="close-btn" onClick={()=>{setShowSettings(false);setResetConfirm(false);}}>×</button>
            </div>
            <div className="modal-body">
              <div className="settings-section">
                <div className="settings-label">About</div>
                <div className="info-banner">
                  <span className="info-banner-icon">&gt;</span>
                  <span>Zywayle runs a real feedforward neural network with BM25 retrieval, intent detection, and character n-gram matching — all in your browser. Nothing is sent to any server.</span>
                </div>
              </div>
              <div className="settings-section">
                <div className="settings-label">Data</div>
                <div className="settings-row">
                  <div className="settings-row-info">
                    <div className="settings-row-title">Chat history</div>
                    <div className="settings-row-sub">{chats.length} conversation{chats.length!==1?'s':''} stored locally</div>
                  </div>
                  {!resetConfirm?(
                    <button className="danger-btn" onClick={()=>setResetConfirm(true)}>Reset all</button>
                  ):(
                    <div style={{display:'flex',gap:5}}>
                      <button className="danger-btn" onClick={resetAll}>Confirm</button>
                      <button className="danger-btn" style={{background:'var(--bg4)',borderColor:'var(--border)',color:'var(--text2)'}} onClick={()=>setResetConfirm(false)}>Cancel</button>
                    </div>
                  )}
                </div>
                {resetConfirm&&<div className="info-banner" style={{marginTop:6}}><span className="info-banner-icon">!</span><span>This permanently deletes all chats and resets model selection. Cannot be undone.</span></div>}
              </div>
              <div className="settings-section">
                <div className="settings-label">Model</div>
                <div className="settings-row">
                  <div className="settings-row-info">
                    <div className="settings-row-title">Active model</div>
                    <div className="settings-row-sub">{curModel?curModel.name+(loadedModel?' · '+loadedModel.pairs?.length+' pairs':' · loading...'):'None loaded'}</div>
                  </div>
                  <button className="danger-btn" style={{background:'var(--accentbg)',borderColor:'var(--accentbd)',color:'var(--accent)'}} onClick={()=>{setShowSettings(false);setShowPicker(true);}}>Switch</button>
                </div>
              </div>
              <div className="settings-section">
                <div className="settings-label">Tools</div>
                <div className="settings-row">
                  <div className="settings-row-info">
                    <div className="settings-row-title">Neural Trainer</div>
                    <div className="settings-row-sub">Train custom models from your own data</div>
                  </div>
                  <a href="training.html" style={{textDecoration:'none'}}><button className="danger-btn" style={{background:'var(--accentbg)',borderColor:'var(--accentbd)',color:'var(--accent)'}}>Open</button></a>
                </div>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
