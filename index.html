let session=null,currentModelId=null,modelConfig=null,kvCache=null,inferenceAborted=false,tokenizer=null;

class KVCache {
  constructor(config) {
    const{layers,kvHeads,headDim,context}=config;
    this.maxLen=context; this.currentLen=0; this.headDim=headDim; this.kvHeads=kvHeads;
    this.buffers=[];
    for(let l=0;l<layers;l++) this.buffers.push({key:new Float32Array(kvHeads*this.maxLen*headDim),value:new Float32Array(kvHeads*this.maxLen*headDim)});
  }
  reset(){this.currentLen=0;for(const b of this.buffers){b.key.fill(0);b.value.fill(0);}}
  slide(){
    const keep=Math.floor(this.maxLen/2),drop=this.currentLen-keep;
    if(drop<=0)return;
    const{kvHeads,headDim}=this;
    for(const b of this.buffers)for(let h=0;h<kvHeads;h++){const s=headDim,o=h*this.maxLen*s;b.key.copyWithin(o,o+drop*s,o+this.currentLen*s);b.value.copyWithin(o,o+drop*s,o+this.currentLen*s);}
    this.currentLen=keep;
  }
  needsSlide(){return this.currentLen>=this.maxLen-64;}
}

class SimpleTokenizer {
  constructor(d){
    this.data=d;
    this.vocab=d.model?.vocab||{};
    this.addedTokens={};
    (d.added_tokens||[]).forEach(t=>{this.addedTokens[t.content]=t.id;});
    this.idToToken={};
    for(const[tok,id] of Object.entries(this.vocab)) this.idToToken[id]=tok;
    for(const[tok,id] of Object.entries(this.addedTokens)) this.idToToken[id]=tok;
  }
  encode(text){return Array.from(new TextEncoder().encode(text)).map(b=>b+1);}
  decode(ids){return ids.map(id=>(this.idToToken[id]||'').replace(/▁/g,' ').replace(/Ġ/g,' ')).join('');}
  get bosId(){return this.data.bos_token_id??1;}
  get eosId(){return this.data.eos_token_id??2;}
}

async function fetchWithProgress(url,onProgress){
  const res=await fetch(url);
  if(!res.ok) throw new Error(`HTTP ${res.status}: ${url}`);
  const total=parseInt(res.headers.get('content-length')||'0');
  const reader=res.body.getReader();
  const chunks=[];let received=0;
  while(true){const{done,value}=await reader.read();if(done)break;chunks.push(value);received+=value.byteLength;if(total>0)onProgress(received/total);}
  const combined=new Uint8Array(received);let offset=0;
  for(const chunk of chunks){combined.set(chunk,offset);offset+=chunk.byteLength;}
  return combined.buffer;
}

async function loadModel(modelId,onProgress){
  const config=MODEL_REGISTRY[modelId];
  if(!config) throw new Error(`Unknown model: ${modelId}`);
  onProgress({text:'Checking WebGPU…',percent:0});
  if(!self.navigator?.gpu) throw new Error('NO_WEBGPU');
  const adapter=await navigator.gpu.requestAdapter({powerPreference:'high-performance'});
  if(!adapter) throw new Error('NO_WEBGPU_ADAPTER');
  onProgress({text:'Downloading model…',percent:2});
  const modelBuffers=[];
  for(let i=0;i<config.files.length;i++){
    const url=config.baseUrl+config.files[i];
    const buf=await fetchWithProgress(url,(p)=>{
      onProgress({text:`Downloading ${config.files[i]}… ${Math.round(p*100)}%`,percent:Math.round(2+(i/config.files.length+p/config.files.length)*70)});
    });
    modelBuffers.push(buf);
  }
  onProgress({text:'Compiling WebGPU shaders…',percent:75});
  const sessionOptions={executionProviders:[{name:'webgpu',deviceType:'gpu',powerPreference:'high-performance',preferredLayout:'NHWC'}],graphOptimizationLevel:'all',enableCpuMemArena:false,enableMemPattern:false,executionMode:'sequential',logSeverityLevel:3,interOpNumThreads:1,intraOpNumThreads:1};
  const modelData=modelBuffers.length===1?modelBuffers[0]:(() => {const total=modelBuffers.reduce((a,b)=>a+b.byteLength,0);const m=new Uint8Array(total);let off=0;for(const b of modelBuffers){m.set(new Uint8Array(b),off);off+=b.byteLength;}return m.buffer;})();
  onProgress({text:'Initializing session…',percent:85});
  session=await ort.InferenceSession.create(modelData,sessionOptions);
  onProgress({text:'Loading tokenizer…',percent:90});
  try{const r=await fetch(config.tokenizer);tokenizer=new SimpleTokenizer(await r.json());}
  catch{tokenizer=new SimpleTokenizer({model:{vocab:{},merges:[]},added_tokens:[]});}
  onProgress({text:'Preallocating KV cache…',percent:95});
  kvCache=new KVCache(config);
  currentModelId=modelId; modelConfig=config;
  onProgress({text:'Ready',percent:100});
  return{success:true,config};
}

function buildPrompt(msg,sys,family){
  switch(family){
    case'qwen': return`<|im_start|>system\n${sys}<|im_end|>\n<|im_start|>user\n${msg}<|im_end|>\n<|im_start|>assistant\n`;
    case'llama': return`<|begin_of_text|><|start_header_id|>system<|end_header_id|>\n\n${sys}<|eot_id|><|start_header_id|>user<|end_header_id|>\n\n${msg}<|eot_id|><|start_header_id|>assistant<|end_header_id|>\n\n`;
    case'phi': return`<|system|>\n${sys}<|end|>\n<|user|>\n${msg}<|end|>\n<|assistant|>\n`;
    default: return`${sys}\n\nUser: ${msg}\nAssistant: `;
  }
}

function buildFeeds(inputIds,positionId,pastLen){
  const idsTensor=new ort.Tensor('int64',BigInt64Array.from(inputIds.map(BigInt)),[1,inputIds.length]);
  const maskLen=pastLen+inputIds.length;
  const maskTensor=new ort.Tensor('int64',new BigInt64Array(maskLen).fill(1n),[1,maskLen]);
  const posTensor=new ort.Tensor('int64',BigInt64Array.from(inputIds.map((_,i)=>BigInt(positionId+i))),[1,inputIds.length]);
  const feeds={input_ids:idsTensor,attention_mask:maskTensor,position_ids:posTensor};
  if(kvCache&&pastLen>0){
    for(let l=0;l<modelConfig.layers;l++){
      const{key,value}=kvCache.buffers[l];const{kvHeads,headDim}=kvCache;
      feeds[`past_key_values.${l}.key`]=new ort.Tensor('float32',key.slice(0,kvHeads*pastLen*headDim),[1,kvHeads,pastLen,headDim]);
      feeds[`past_key_values.${l}.value`]=new ort.Tensor('float32',value.slice(0,kvHeads*pastLen*headDim),[1,kvHeads,pastLen,headDim]);
    }
  }
  return feeds;
}

function updateKVFromResult(result,positionId){
  if(!kvCache)return;
  for(let l=0;l<modelConfig.layers;l++){
    const kk=`present.${l}.key`,vk=`present.${l}.value`;
    if(result[kk]){
      const kd=result[kk].data,vd=result[vk].data;const{kvHeads,headDim}=kvCache;
      const offset=(positionId+1)*headDim;
      for(let h=0;h<kvHeads;h++){const s=h*offset,d=h*kvCache.maxLen*headDim;kvCache.buffers[l].key.set(kd.slice(s,s+offset),d);kvCache.buffers[l].value.set(vd.slice(s,s+offset),d);}
    }
  }
}

function extractLogits(result){
  const k=Object.keys(result).find(k=>k.includes('logit')||k==='last_hidden_state'||k==='output');
  if(!k) throw new Error('No logits in model output');
  return result[k].data.slice(-modelConfig.vocabSize);
}

function sample(logits,temperature,topK,topP){
  const temp=Math.max(temperature,1e-6);
  const scaled=new Float32Array(logits.length);for(let i=0;i<logits.length;i++)scaled[i]=logits[i]/temp;
  let maxVal=-Infinity;for(let i=0;i<scaled.length;i++)if(scaled[i]>maxVal)maxVal=scaled[i];
  let sum=0;const probs=new Float32Array(scaled.length);for(let i=0;i<scaled.length;i++){probs[i]=Math.exp(scaled[i]-maxVal);sum+=probs[i];}
  for(let i=0;i<probs.length;i++)probs[i]/=sum;
  const indexed=Array.from(probs).map((p,i)=>[i,p]).sort((a,b)=>b[1]-a[1]).slice(0,topK);
  let cumSum=0;const nucleus=[];
  for(const[id,p] of indexed){nucleus.push([id,p]);cumSum+=p;if(cumSum>=topP)break;}
  const ns=nucleus.reduce((s,[,p])=>s+p,0);let rand=Math.random()*ns,acc=0;
  for(const[id,p] of nucleus){acc+=p;if(rand<=acc)return id;}
  return nucleus[0][0];
}

async function* runInference(prompt,config={}){
  if(!session) throw new Error('No model loaded');
  if(kvCache.needsSlide())kvCache.slide();
  inferenceAborted=false;
  const maxNewTokens=config.maxTokens??512,temperature=config.temperature??0.7,topP=config.topP??0.9,topK=config.topK??50;
  const sys='You are Wayle, a helpful, concise and smart AI assistant.';
  const fullPrompt=buildPrompt(prompt,sys,modelConfig.family);
  let inputIds=tokenizer.encode(fullPrompt);
  if(inputIds.length>modelConfig.context-64)inputIds=inputIds.slice(-(modelConfig.context-64));
  const eosTokens=new Set([tokenizer.eosId,...(modelConfig.family==='qwen'?[151645,151643]:[]),...(modelConfig.family==='llama'?[128001,128009]:[])]);
  let positionId=kvCache.currentLen,generated=0,pastLen=0;
  for(let i=0;i<inputIds.length;i++){
    if(inferenceAborted)return;
    if(i%4===0)await new Promise(r=>setTimeout(r,0));
    try{const result=await session.run(buildFeeds([inputIds[i]],positionId+i,pastLen));updateKVFromResult(result,positionId+i);pastLen=positionId+i+1;}
    catch(e){throw new Error(`Prefill failed at token ${i}: ${e.message}`);}
  }
  positionId+=inputIds.length;kvCache.currentLen=positionId;
  let lastTokenId=inputIds[inputIds.length-1],tokenBuffer=[];
  while(generated<maxNewTokens&&!inferenceAborted){
    const feeds=buildFeeds([lastTokenId],positionId,pastLen);
    let result;
    try{result=await session.run(feeds);}catch(e){throw new Error(`Decode step ${generated} failed: ${e.message}`);}
    const logits=extractLogits(result);
    updateKVFromResult(result,positionId);
    pastLen=positionId+1;positionId++;kvCache.currentLen=positionId;
    const nextToken=sample(logits,temperature,topK,topP);
    if(eosTokens.has(nextToken))break;
    lastTokenId=nextToken;generated++;tokenBuffer.push(nextToken);
    if(tokenBuffer.length>=3||generated===1){const text=tokenizer.decode(tokenBuffer);if(text)yield text;tokenBuffer=[];}
    if(generated%4===0)await new Promise(r=>setTimeout(r,0));
    if(kvCache.needsSlide()){kvCache.slide();positionId=kvCache.currentLen;}
  }
  if(tokenBuffer.length>0){const text=tokenizer.decode(tokenBuffer);if(text)yield text;}
}

self.onmessage=async({data})=>{
  const{type,id}=data;
  switch(type){
    case'load_model':{
      try{const r=await loadModel(data.modelId,p=>self.postMessage({type:'load_progress',id,...p}));self.postMessage({type:'load_done',id,config:r.config});}
      catch(e){self.postMessage({type:'load_error',id,error:e.message});}
      break;
    }
    case'generate':{
      try{
        const gen=runInference(data.prompt,data.options);let tokenCount=0;const t0=performance.now();
        for await(const token of gen){
          if(inferenceAborted)break;
          tokenCount++;const elapsed=(performance.now()-t0)/1000;
          self.postMessage({type:'token',id,token,stats:{tokensPerSec:tokenCount/elapsed,tokenCount}});
        }
        self.postMessage({type:'done',id,stats:{totalTokens:tokenCount,totalMs:performance.now()-t0}});
      }catch(e){self.postMessage({type:'generate_error',id,error:e.message});}
      break;
    }
    case'abort':{inferenceAborted=true;self.postMessage({type:'aborted',id});break;}
    case'reset_kv':{if(kvCache)kvCache.reset();self.postMessage({type:'kv_reset',id});break;}
    case'unload':{session=null;kvCache=null;currentModelId=null;modelConfig=null;self.postMessage({type:'unloaded',id});break;}
  }
};
</script>

<script>
// ─── Tesseract OCR (lazy loaded) ──────────────────────────────────────────────
let Tesseract = null;
async function loadTesseract() {
  if (Tesseract) return Tesseract;
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.0.3/tesseract.min.js';
    s.onload = () => { Tesseract = window.Tesseract; res(Tesseract); };
    s.onerror = rej;
    document.head.appendChild(s);
  });
}
async function runOCR(dataUrl, onProgress) {
  const T = await loadTesseract();
  const worker = await T.createWorker('eng', 1, {
    logger: m => { if (m.status === 'recognizing text') onProgress && onProgress(Math.round(m.progress * 100)); }
  });
  const { data: { text } } = await worker.recognize(dataUrl);
  await worker.terminate();
  return text.trim();
}
</script>

// ─── Worker factory ────────────────────────────────────────────────────────────
function createWorker() {
  const workerSrc = document.getElementById('worker-src')?.textContent || '';
  const blob = new Blob([workerSrc], { type: 'application/javascript' });
  const blobUrl = URL.createObjectURL(blob);
  const w = new Worker(blobUrl);
  setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);
  return w;
}

// ─── helpers ──────────────────────────────────────────────────────────────────
async function cachedLogo(url) {
  url = url || LOGO_DARK;
  try {
    if ('caches' in window) {
      const cache = await caches.open('wayle-assets-v1');
      const hit = await cache.match(url);
      if (hit) return URL.createObjectURL(await hit.blob());
      const res = await fetch(url);
      if (res.ok) { cache.put(url, res.clone()); return URL.createObjectURL(await res.blob()); }
    }
  } catch(e) {}
  return url;
}
async function detectCaps() {
  const ua = navigator.userAgent;
  const isMobile = /Mobi|Android|iPhone|iPad/.test(ua);
  let hasWebGPU = false, gpuInfo = null;
  try {
    if (navigator.gpu) {
      const a = await navigator.gpu.requestAdapter({ powerPreference:'high-performance' });
      if (a) { hasWebGPU = true; const info = await a.requestAdapterInfo().catch(() => ({})); gpuInfo = info?.description || info?.vendor || 'GPU active'; }
    }
  } catch(e) {}
  return { isMobile, hasWebGPU, gpuInfo, hasSAB: typeof SharedArrayBuffer !== 'undefined', ram: navigator.deviceMemory || 4 };
}

// ─── InferenceWorker ──────────────────────────────────────────────────────────
class InferenceWorker {
  constructor() { this.w = null; this.pending = new Map(); this.streams = new Map(); this.n = 0; }
  init() {
    this.w = createWorker();
    this.w.onmessage = ({ data }) => {
      const { type, id } = data;
      const req = this.pending.get(id);
      const st = this.streams.get(id);
      switch (type) {
        case 'load_progress': req?.onProgress?.(data); break;
        case 'load_done': req?.resolve(data); this.pending.delete(id); break;
        case 'load_error': req?.reject(new Error(data.error)); this.pending.delete(id); break;
        case 'token': st?.onToken(data.token, data.stats); break;
        case 'done': st?.onDone(data.stats); this.streams.delete(id); this.pending.delete(id); break;
        case 'generate_error': st?.onError(new Error(data.error)); this.streams.delete(id); this.pending.delete(id); break;
        case 'aborted': st?.onDone({ aborted:true }); this.streams.delete(id); this.pending.delete(id); break;
        default: req?.resolve?.(data); this.pending.delete(id);
      }
    };
    this.w.onerror = e => console.error('[Worker]', e);
  }
  loadModel(mid, onProgress) {
    return new Promise((resolve, reject) => {
      const id = ++this.n;
      this.pending.set(id, { resolve, reject, onProgress });
      this.w.postMessage({ type:'load_model', id, modelId:mid });
    });
  }
  generate(prompt, opts, { onToken, onDone, onError }) {
    const id = ++this.n;
    this.streams.set(id, { onToken, onDone, onError });
    this.pending.set(id, {});
    this.w.postMessage({ type:'generate', id, prompt, options:opts });
    return id;
  }
  abort(id) { this.w?.postMessage({ type:'abort', id }); }
  resetKV() { return new Promise((resolve, reject) => { const id = ++this.n; this.pending.set(id, { resolve, reject }); this.w.postMessage({ type:'reset_kv', id }); }); }
  terminate() { this.w?.terminate(); }
}

// ─── Markdown renderer (handles inline formatting mid-stream) ─────────────────
function md(text, streaming = false) {
  if (!text) return '';
  let t = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```([\w]*)[\r\n]?([\s\S]*?)```/g, (_, l, c) => `<pre class="cb"><span class="cl">${l||'code'}</span><code>${c.trim()}</code></pre>`)
    .replace(/`([^`]+)`/g, '<code class="ic">$1</code>')
    // Bold: **text** — apply even mid-stream when closing ** present
    .replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>')
    // Italic: *text* — only when closing * is present (safe mid-stream)
    .replace(/\*([^*\n]+)\*/g, '<em>$1</em>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/^[-*] (.+)$/gm,'<li>$1</li>').replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`)
    .replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br/>')
    .replace(/^(?!<[hupol])(.+)/,'<p>$1').replace(/([^>])$/,'$1</p>');
  return t;
}

// ─── Streaming text with live markdown (applies *bold* *italic* while typing) ──
function StreamingMd({ content }) {
  // Full markdown parse even while streaming so *text* renders live
  const html = useMemo(() => md(content, true), [content]);
  return React.createElement('span', {
    dangerouslySetInnerHTML: { __html: html + '<span class="cur"></span>' }
  });
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [view,        setView]        = useState('chat');
  const [msgs,        setMsgs]        = useState([]);
  const [input,       setInput]       = useState('');
  const [curMod,      setCurMod]      = useState(MODELS[1]);
  const [loadedModel, setLoadedModel] = useState(null);
  const [engState,    setEngState]    = useState('idle');
  const [loadProg,    setLoadProg]    = useState({ text:'', percent:0 });
  const [streaming,   setStreaming]   = useState(false);
  const [streamStats, setStreamStats] = useState(null);
  const [logo,        setLogo]        = useState(LOGO_DARK);
  const [toast,       setToast]       = useState(null);
  const [caps,        setCaps]        = useState(null);
  const [attachedImg, setAttachedImg] = useState(null);
  const [theme,       setTheme]       = useState(getStoredTheme);
  const [showSettings,setShowSettings]= useState(false);
  const [ocrState,    setOcrState]    = useState(null); // null | 'running' | number(%)

  const wRef     = useRef(null);
  const genIdRef = useRef(null);
  const taRef    = useRef(null);
  const botRef   = useRef(null);
  const fileRef  = useRef(null);

  /* ── init ── */
  useEffect(() => {
    const splash = document.getElementById('splash');
    if (splash) { splash.style.animation = 'sOut .4s ease forwards'; setTimeout(() => splash.remove(), 420); }
    const initT = getStoredTheme();
    const logoUrl = initT === 'dark' ? LOGO_DARK : LOGO_LIGHT;
    cachedLogo(logoUrl).then(setLogo);
    detectCaps().then(setCaps);
    try { const w = new InferenceWorker(); w.init(); wRef.current = w; } catch(e) { console.warn('[Worker]', e); }
    return () => wRef.current?.terminate();
  }, []);

  useEffect(() => {
    requestAnimationFrame(() => botRef.current?.scrollIntoView({ behavior:'smooth', block:'end' }));
  }, [msgs.length, streaming]);

  const switchTheme = useCallback((t) => {
    setTheme(t);
    setStoredTheme(t);
    applyThemeCSS(t);
    const logoUrl = t === 'dark' ? LOGO_DARK : LOGO_LIGHT;
    cachedLogo(logoUrl).then(setLogo);
  }, []);

  const resize = useCallback(() => {
    const el = taRef.current;
    if (!el) return;
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }, []);

  const toast$ = useCallback((msg, ms=2800) => {
    setToast(msg);
    setTimeout(() => setToast(null), ms);
  }, []);

  const loadModel = useCallback(async (m) => {
    if (!wRef.current) { toast$('Worker not ready'); return; }
    if (!m.free) { toast$('Pro model — coming soon'); return; }
    setCurMod(m);
    setEngState('loading');
    setLoadProg({ text:'Initializing…', percent:0 });
    try {
      await wRef.current.loadModel(m.id, p => setLoadProg({ text:p.text, percent:p.percent }));
      setLoadedModel(m.id);
      setEngState('ready');
      toast$(`${m.label} loaded`);
    } catch(e) {
      setEngState('idle');
      if (e.message === 'NO_WEBGPU' || e.message === 'NO_WEBGPU_ADAPTER') {
        toast$('WebGPU not available — use Chrome 113+ on desktop', 4000);
      } else {
        toast$(`Load failed: ${e.message}`);
      }
    }
  }, [toast$]);

  /* ── image attach + OCR ── */
  const handleImageFile = useCallback(async (file) => {
    if (!file || !file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = async (e) => {
      const dataUrl = e.target.result;
      setAttachedImg({ dataUrl, ocrText: null, ocrRunning: true });
      toast$('Image attached — extracting text with OCR…', 3500);
      setOcrState('running');
      try {
        const text = await runOCR(dataUrl, pct => setOcrState(pct));
        setAttachedImg(prev => prev ? { ...prev, ocrText: text, ocrRunning: false } : null);
        setOcrState(null);
        if (text) {
          toast$(`OCR complete — ${text.split(/\s+/).length} words extracted`, 2500);
        } else {
          toast$('OCR: no text found in image', 2000);
        }
      } catch(err) {
        setAttachedImg(prev => prev ? { ...prev, ocrText: '', ocrRunning: false } : null);
        setOcrState(null);
        toast$('OCR failed — image will be described without text extraction');
      }
    };
    reader.readAsDataURL(file);
  }, [toast$]);

  /* ── send ── */
  const handleSend = useCallback(async () => {
    const text = input.trim();
    if ((!text && !attachedImg) || streaming) return;
    const uid = () => crypto.randomUUID?.() || Math.random().toString(36).slice(2);

    let prompt = text;
    let displayContent = text;

    if (attachedImg) {
      const ocrNote = attachedImg.ocrText
        ? `\n\n[Image attached. OCR text extracted from image:\n${attachedImg.ocrText}]`
        : '\n\n[Image attached. This model can only read text from images via OCR. No visual content was extracted.]';
      prompt = (text || 'Describe or analyze the attached content.') + ocrNote;
      displayContent = text || 'Image';
    }

    const uMsg = { role:'user', content: displayContent, image: attachedImg?.dataUrl, ts:Date.now(), id:uid() };
    setMsgs(p => [...p, uMsg]);
    setInput('');
    setAttachedImg(null);
    setOcrState(null);
    if (taRef.current) taRef.current.style.height = 'auto';

    const aId = uid();
    setMsgs(p => [...p, { role:'assistant', content:'', ts:Date.now(), id:aId }]);
    setStreaming(true);
    setStreamStats(null);

    const appendToken = (tok, stats) => {
      if (stats) setStreamStats(stats);
      setMsgs(p => { const c=[...p]; const l=c[c.length-1]; if (l?.role==='assistant') c[c.length-1]={...l, content:l.content+tok}; return c; });
    };
    const finalize = (tps) => {
      setStreaming(false);
      genIdRef.current = null;
      setMsgs(p => { const c=[...p]; const l=c[c.length-1]; if (l?.role==='assistant') c[c.length-1]={...l, tps}; return c; });
    };

    if (wRef.current && engState === 'ready') {
      const gid = wRef.current.generate(prompt, { maxTokens:512, temperature:0.7, topP:0.9, topK:40 }, {
        onToken: (tok, stats) => appendToken(tok, stats),
        onDone:  (stats) => finalize(stats?.totalMs ? stats.totalTokens/stats.totalMs*1000 : null),
        onError: (e) => {
          setStreaming(false); genIdRef.current = null; toast$(`Error: ${e.message}`);
          setMsgs(p => { const c=[...p]; const l=c[c.length-1]; if (l?.role==='assistant' && !l.content) c[c.length-1]={...l, content:'Generation failed.'}; return c; });
        },
      });
      genIdRef.current = gid;
      return;
    }
    if (engState === 'loading') {
      setStreaming(false); setMsgs(p => p.slice(0,-2)); toast$('Still loading model — please wait'); return;
    }
    const noModelReply = `**No model loaded yet.** Go to the **Models** tab and tap a free model to download and run it on your device.\n\nWayle runs 100% offline using WebGPU — no data ever leaves your browser.`;
    let i = 0;
    const interval = setInterval(() => {
      if (i >= noModelReply.length) { clearInterval(interval); finalize(null); return; }
      appendToken(noModelReply.slice(i, i+4), null); i += 4;
    }, 16);
  }, [input, attachedImg, streaming, engState, toast$]);

  const handleStop = useCallback(() => {
    if (genIdRef.current && wRef.current) wRef.current.abort(genIdRef.current);
    setStreaming(false); genIdRef.current = null;
  }, []);

  const handleKey = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } };
  const canSend = (input.trim().length > 0 || attachedImg !== null) && !streaming && engState !== 'loading';
  const onNewChat = () => { setMsgs([]); setAttachedImg(null); setOcrState(null); wRef.current?.resetKV().catch(()=>{}); setView('chat'); };

  const handleCacheReset = () => { wRef.current?.resetKV().catch(()=>{}); toast$('KV cache reset'); };
  const handleFullReset = async () => {
    wRef.current?.terminate(); wRef.current = null;
    setMsgs([]); setLoadedModel(null); setEngState('idle'); setAttachedImg(null);
    try {
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
      if (indexedDB.databases) {
        const dbs = await indexedDB.databases();
        await Promise.all(dbs.map(db => new Promise((res,rej) => { const r=indexedDB.deleteDatabase(db.name); r.onsuccess=res; r.onerror=rej; })));
      }
    } catch(e) {}
    toast$('Full reset complete — reload to reinitialize', 4000);
    setTimeout(() => location.reload(), 2500);
  };

  const SUGG = ['Explain transformers simply', 'Write a haiku about privacy', "What's 17 x 23?", 'Debug this: console.log(1 + "1")'];
  const TABS = [['chat','chat_bubble','Chat'],['models','memory','Models'],['plans','diamond','Plans']];
  const curModData = MODELS.find(m => m.id === (loadedModel || curMod?.id)) || MODELS[1];

  const ChatView = React.createElement('div', { className: 'chat' },
    React.createElement('input', { ref:fileRef, type:'file', accept:'image/*', style:{display:'none'},
      onChange: e => { const f=e.target.files?.[0]; if (f) handleImageFile(f); e.target.value=''; }
    }),
    React.createElement('div', { className: 'mbar' },
      React.createElement('button', { className:'mpill', onClick:()=>setView('models') },
        React.createElement('span', { className:`dot ${loadedModel?'on':'off'}` }),
        loadedModel ? curModData.label : 'No model loaded',
        React.createElement('span', { className:'i s14', style:{marginLeft:2,color:'var(--t3)'} }, 'expand_more')
      ),
      streamStats && streaming && React.createElement('span', { className:'tbadge' }, streamStats.tokensPerSec?.toFixed(1), ' t/s'),
      engState === 'loading' && React.createElement('div', { className:'pw' },
        React.createElement('div', { className:'mspin' }),
        React.createElement('span', { className:'pt' }, loadProg.text),
        React.createElement('div', { className:'ptrk' },
          React.createElement('div', { className:'pfil', style:{width:`${loadProg.percent}%`} })
        )
      )
    ),
    React.createElement('div', { className:'msgs' },
      React.createElement('div', { className:'msgs-in' },
        msgs.length === 0
          ? React.createElement('div', { className:'welcome' },
              React.createElement('div', { className:'wlogo' }, React.createElement('img', { src:logo, alt:'Wayle' })),
              React.createElement('div', { className:'wtitle' }, 'How can I help?'),
              caps?.hasWebGPU && React.createElement('div', { className:'wgpu' },
                React.createElement('span', { className:'i f s13' }, 'bolt'), 'WebGPU · ', caps.gpuInfo || 'GPU Ready'
              ),
              React.createElement('div', { className:'wsub' }, loadedModel ? `${curModData.label} · fully offline` : 'Load a model in the Models tab to get started'),
              React.createElement('div', { className:'chips' },
                SUGG.slice(0,3).map(s => React.createElement('button', { key:s, className:'chip', onClick:()=>{ setInput(s); taRef.current?.focus(); } }, s))
              )
            )
          : React.createElement(React.Fragment, null,
              msgs.map((m, i) => React.createElement(Msg, {
                key: m.id || i, msg: m,
                streaming: streaming && i === msgs.length-1 && m.role==='assistant'
              })),
              streaming && msgs[msgs.length-1]?.role !== 'assistant' && React.createElement(Typing)
            ),
        React.createElement('div', { className:'spacer' }),
        React.createElement('div', { ref:botRef, className:'anch' })
      )
    ),
    React.createElement('div', { className:'ibar' },
      React.createElement('div', { className:'iwrap' },
        attachedImg && React.createElement('div', { className:'img-attach' },
          React.createElement('div', { className:'img-preview' },
            React.createElement('img', { src:attachedImg.dataUrl, alt:'attached' }),
            React.createElement('button', { className:'img-remove', onClick:()=>{ setAttachedImg(null); setOcrState(null); } },
              React.createElement('span', { className:'i f s13', style:{lineHeight:1} }, 'close')
            )
          ),
          React.createElement('div', { className:'img-pill' },
            React.createElement('span', { className:'i f s13' }, 'image'),
            attachedImg.ocrRunning
              ? `Extracting text… ${ocrState==='running'?'':ocrState+'%'}`
              : attachedImg.ocrText
                ? `OCR complete — ${attachedImg.ocrText.split(/\s+/).length} words extracted`
                : 'Image attached · text-only via OCR (no vision model)'
          )
        ),
        React.createElement('div', { className:'ibox' },
          React.createElement('button', { className:'img-btn', title:'Attach image (OCR)', onClick:()=>fileRef.current?.click() },
            React.createElement('span', { className:'i s18' }, 'add_photo_alternate')
          ),
          React.createElement('textarea', {
            ref:taRef, value:input,
            onChange: e => { setInput(e.target.value); resize(); },
            onKeyDown: handleKey,
            placeholder: loadedModel ? 'Message Wayle…' : 'Load a model to start…',
            rows:1, disabled: streaming || engState==='loading',
            autoComplete:'off', autoCorrect:'on', spellCheck:true
          }),
          streaming
            ? React.createElement('button', { className:'snd stop', onClick:handleStop }, React.createElement('span', { className:'i f s18' }, 'stop'))
            : React.createElement('button', { className:'snd', onClick:handleSend, disabled:!canSend },
                engState==='loading'
                  ? React.createElement('div', { className:'bspin' })
                  : React.createElement('span', { className:'i f s18' }, 'arrow_upward')
              )
        ),
        React.createElement('div', { className:'ihint' }, 'Wayle runs 100% on your device · no data sent anywhere')
      )
    )
  );

  return React.createElement('div', { className:'app' },
    React.createElement('aside', { className:'sidebar' },
      React.createElement('button', { className:'sb-brand', onClick:()=>setView('chat') },
        React.createElement('div', { className:'sb-logo' }, React.createElement('img', { src:logo, alt:'Wayle' })),
        React.createElement('span', { className:'sb-name' }, 'Wayle')
      ),
      React.createElement('nav', { className:'sb-nav' },
        TABS.map(([id,ic,lb]) => React.createElement('button', {
          key:id, className:`stab${view===id?' on':''}`, onClick:()=>setView(id)
        }, React.createElement('span', { className:`i${view===id?' f':''}` }, ic), lb))
      ),
      React.createElement('div', { className:'sb-bot' },
        React.createElement('button', { className:'nc', onClick:onNewChat },
          React.createElement('span', { className:'i s18' }, 'add_comment'), 'New chat'
        ),
        React.createElement('div', { style:{display:'flex',gap:4,marginTop:4} },
          React.createElement('button', {
            className:'danger-btn', style:{flex:1,borderColor:'var(--bdr)',color:'var(--t3)',fontSize:12,padding:'7px 6px'},
            onClick:()=>setView('about')
          }, React.createElement('span', { className:'i s14' }, 'info'), 'About'),
          React.createElement('button', {
            className:'danger-btn', style:{flex:1,borderColor:'var(--bdr)',color:'var(--t3)',fontSize:12,padding:'7px 6px'},
            onClick:()=>setShowSettings(true)
          }, React.createElement('span', { className:'i s14' }, 'settings'), 'Settings')
        )
      )
    ),
    React.createElement('div', { className:'main' },
      React.createElement('div', { className:'mtop' },
        React.createElement('div', { className:'mb' },
          React.createElement('div', { className:'mb-logo' }, React.createElement('img', { src:logo, alt:'Wayle' })),
          React.createElement('span', { className:'mb-name' }, 'Wayle')
        ),
        React.createElement('div', { className:'mtop-right' },
          React.createElement('button', { className:'ib', onClick:onNewChat }, React.createElement('span', { className:'i s18' }, 'add_comment')),
          React.createElement('button', { className:'settings-btn', onClick:()=>setShowSettings(true) },
            React.createElement('span', { className:'i s16' }, 'settings')
          )
        )
      ),
      React.createElement('div', { className:'cnt' },
        view==='chat'    && ChatView,
        view==='models'  && React.createElement(ModelsView, { caps, curMod, loadedModel, engState, loadProg, theme, onLoad: m => { loadModel(m); setView('chat'); } }),
        view==='plans'   && React.createElement(PlansView, { onLearnMore: ()=>setView('privacy') }),
        (view==='about' || view==='privacy') && React.createElement('div', { style:{display:'flex',flexDirection:'column',flex:1,overflow:'hidden'} },
          React.createElement('div', { style:{display:'flex',alignItems:'center',gap:8,padding:'10px 16px',borderBottom:'1px solid var(--bdr)',flexShrink:0,background:'var(--sbg)'} },
            React.createElement('button', {
              onClick:()=>setView('plans'),
              style:{display:'flex',alignItems:'center',gap:4,border:'none',background:'transparent',color:'var(--t2)',cursor:'pointer',fontSize:13,fontFamily:'var(--fn)',padding:'4px 0'}
            }, React.createElement('span', { className:'i s18' }, 'arrow_back'), 'Back'),
            React.createElement('span', { style:{fontSize:14,fontWeight:600,color:'var(--tx)'} }, view==='about' ? 'About Wayle' : 'Privacy & Legal')
          ),
          view==='about'   && React.createElement(AboutView, { logo, onPrivacy: ()=>setView('privacy') }),
          view==='privacy' && React.createElement(PrivacyView, { logo })
        )
      ),
      React.createElement('nav', { className:'mbn', style:{display:'flex'} },
        TABS.map(([id,ic,lb]) => React.createElement('button', {
          key:id, className:`btab${view===id?' on':''}`, onClick:()=>setView(id)
        }, React.createElement('span', { className:`i${view===id?' f':''} s22` }, ic), lb))
      )
    ),
    toast && React.createElement('div', { className:'toast' }, toast),
    showSettings && React.createElement(SettingsModal, {
      theme,
      onTheme: switchTheme,
      onCacheReset: handleCacheReset,
      onFullReset: handleFullReset,
      onClose: () => setShowSettings(false)
    })
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(() => {}); });
}
</script>
</body>
</html>
