<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="theme-color" content="#ffffff"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Wayle"/>
  <meta name="description" content="Wayle — fast, private, on-device AI powered by ONNX Runtime Web + WebGPU"/>
  <title>Wayle</title>

  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" href="https://i.ibb.co/xSFJxP7F/wayle-dark.png"/>
  <link rel="apple-touch-icon" href="https://i.ibb.co/xSFJxP7F/wayle-dark.png"/>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#ffffff;--sidebar-bg:#f7f7f8;--surface:#ffffff;--s2:#f4f4f5;--s3:#e4e4e7;
      --border:#e4e4e7;--border2:#d1d1d6;
      --text:#09090b;--t2:#52525b;--t3:#a1a1aa;
      --purple:#7c3aed;--ph:#6d28d9;--pl:#8b5cf6;
      --pdim:#ede9fe;--pglow:rgba(124,58,237,.16);
      --green:#16a34a;--red:#dc2626;--blue:#2563eb;
      --font:'Space Grotesk',sans-serif;--serif:'Instrument Serif',serif;
      --sidebar-w:256px;--r:16px;--rsm:12px;--rxs:8px;
      --hh:56px;--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
    }
    html,body{height:100%;overflow:hidden;font-family:'Space Grotesk',sans-serif;background:#ffffff;color:#09090b;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
    #root{height:100%}

    /* Splash */
    .splash{
      position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
      flex-direction:column;gap:16px;background:#ffffff;z-index:999;
      transition:opacity .35s ease;
    }
    .splash img{width:48px;height:48px;object-fit:contain;border-radius:12px}
    .splash-name{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:20px;color:#09090b;letter-spacing:-.5px}
    .splash-sub{font-size:13px;color:#a1a1aa;font-family:'Space Grotesk',sans-serif}
    .splash-spin{width:18px;height:18px;border-radius:50%;border:2px solid #e4e4e7;border-top-color:#7c3aed;animation:sp .7s linear infinite}
    @keyframes sp{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="splash" id="splash">
    <img src="https://i.ibb.co/xSFJxP7F/wayle-dark.png" alt="Wayle"/>
    <div class="splash-name">Wayle</div>
    <div class="splash-sub">Loading on-device AI…</div>
    <div class="splash-spin"></div>
  </div>

  <div id="root"></div>

  <!-- React + Babel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <script type="text/babel" data-presets="react" src="app.jsx"></script>

  <script>
    window.__wayleReady = function() {
      const s = document.getElementById('splash');
      if (s) { s.style.opacity = '0'; setTimeout(() => s.remove(), 350); }
    };
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(reg => {
          reg.addEventListener('updatefound', () => {
            const nw = reg.installing;
            nw?.addEventListener('statechange', () => {
              if (nw.state === 'installed' && navigator.serviceWorker.controller)
                console.log('[Wayle] Update available. Refresh to apply.');
            });
          });
        }).catch(() => {});
      });
    }
    const obs = new MutationObserver(() => {
      if (document.getElementById('root')?.children.length > 0) {
        window.__wayleReady?.(); obs.disconnect();
      }
    });
    obs.observe(document.getElementById('root'), { childList: true });
    setTimeout(() => window.__wayleReady?.(), 5000);
  </script>
</body>
</html>
